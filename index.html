<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>James Gan & Linh Vuu Wedding</title>
  <meta name="description" content="Invite, Info, Schedule, Malaysia vs Seattle Ceremonies, and Wedding Journey." />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --link-font-family: "Montserrat", "Inter", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, "Apple Color Emoji", "Segoe UI Emoji";
      --link-font-weight: 600;
      --link-font-style: normal;
      --link-font-size: clamp(18px, 2.5vw, 28px);
      --link-letter-spacing: 0.02em;
      --link-color: #efbf04;
      --link-hover-color: #0066CC;
    }

    body {
      font-family: 'Montserrat', sans-serif;
    }

    h1, h2 {
      font-family: 'Playfair Display', serif;
    }

    h3, p {
      font-family: 'Montserrat', sans-serif;
    }

    html, body { height: 100%; }

    body {
      margin: 0;
      background: #b50000;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    nav {
      display: flex;
      gap: 1rem;
      margin-top: 20px;
      flex-wrap: wrap;
      justify-content: center;
    }

    nav button {
      background: #fff;
      color: #b50000;
      font-weight: 700;
      padding: 0.5rem 1rem;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }

    nav button:hover {
      background: #ffd1d1;
    }

    main {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      width: 100%;
      padding: 24px;
    }

    .tab-content {
      display: none;
      text-align: center;
      width: 100%;
    }

    .tab-content.active {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
    }

    img.hero {
      display: block;
      max-width: 90vw;
      max-height: 80vh;
      height: auto;
      width: auto;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      object-fit: contain;
    }

    a.link {
      font-family: var(--link-font-family);
      font-weight: var(--link-font-weight);
      font-style: var(--link-font-style);
      font-size: var(--link-font-size);
      letter-spacing: var(--link-letter-spacing);
      color: var(--link-color);
      text-decoration: none;
      border-bottom: 2px solid currentColor;
      padding-bottom: 2px;
      transition: color .2s ease;
    }

    a.link:hover {
      color: var(--link-hover-color);
    }

    footer {
      margin: 20px 0;
    }

    .info-box, .schedule-box, .malaysia-seattle-box, .wedding-journey-box {
      background: #fff;
      color: #333;
      max-width: min(90vw, 800px);
      max-height: 80vh;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 12px 30px rgba(0,0,0,0.28);
      overflow-y: auto;
      font-size: 18px;
      line-height: 1.6;
    }

    /* Timeline styles */
    .timeline {
      display: flex;
      flex-direction: column;
      gap: 40px;
      margin-top: 20px;
    }

    .timeline-item {
      display: flex;
      align-items: center;
      gap: 20px;
    }

    .timeline-item.left {
      flex-direction: row;
    }

    .timeline-item.right {
      flex-direction: row-reverse;
    }

    .timeline-item img {
      max-width: 200px;
      border-radius: 12px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.2);
    }

    .timeline-item .text {
      max-width: 400px;
      text-align: left;
    }
  </style>
</head>
<body>
  <nav>
    <button onclick="showTab('photo')">Photo</button>
    <button onclick="showTab('info')">Info</button>
    <button onclick="showTab('schedule')">Schedule</button>
    <button onclick="showTab('malaysia-seattle')">Malaysia vs Seattle</button>
    <button onclick="showTab('wedding-journey')">Wedding Journey</button>
  </nav>

  <div class="rsvp-container">
    <a class="link" href="https://forms.gle/5D6W111kEJz2MauN7" target="_blank" rel="noopener">répondez s'il vous plaît (RSVP)</a>
  </div>

  <main>
    <div id="photo" class="tab-content active">
      <img class="hero" src="invite-01.png" alt="Event invitation" />
    </div>

    <div id="info" class="tab-content">
      <div class="info-box">
        <h2>Event Information</h2>
        <!-- Your info content here -->
      </div>
    </div>

    <div id="schedule" class="tab-content">
      <div class="schedule-box">
        <h2>Wedding Day Schedule</h2>
        <!-- Your schedule content here -->
      </div>
    </div>

    <div id="malaysia-seattle" class="tab-content">
      <div class="malaysia-seattle-box">
        <h2>Malaysia vs Seattle</h2>
        <!-- Your Malaysia vs Seattle content here -->
      </div>
    </div>

    <div id="wedding-journey" class="tab-content">
      <div class="wedding-journey-box">
        <h2>Wedding Journey</h2>
        <div class="timeline">
          <div class="timeline-item left">
            <img src="journey-1.jpg" alt="How we met" />
            <div class="text">
              <h3>our story</h3>
              <p>met at Cornell</p>
            </div>
          </div>
          <div class="timeline-item right">
            <div class="text">
              <h3>next steps</h3>
              <p>moving to Spain!</p>
            </div>
            <img src="journey-2.jpg" alt="Trip to Vietnam" />
          </div>
          <div class="timeline-item left">
            <img src="journey-3.jpg" alt="Proposal" />
            <div class="text">
              <h3>wedding</h3>
              <ul>
                <li>2 AAPI Businesses supported, local made rings</li>
                <li>DIY organized in 3 months</li>
                <li>$450 donated to charity</li>
              </ul>
            </div>
          </div>
        </div>
      </div>
    </div>
  </main>

  <footer></footer>

  <script>
    function showTab(id) {
      document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
      document.getElementById(id).classList.add('active');
    }

    async function detectCountryAndSetTab() {
      try {
        let response = await fetch("https://ipapi.co/json/");
        let data = await response.json();
        if (data && data.country_name === "Malaysia") {
          showTab("malaysia-seattle");
        } else {
          showTab("photo"); // fallback default
        }
      } catch (e) {
        console.error("Geolocation failed:", e);
        showTab("photo"); // fallback
      }
    }

    window.addEventListener("DOMContentLoaded", detectCountryAndSetTab);
  </script>
</body>
</html>
