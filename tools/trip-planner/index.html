                if (settings.showPhotos && a.photos?.length > 0) {
                    photoStrip = `<div style="display:flex;gap:4px;margin:4px 0 8px 28px;overflow-x:auto">${a.photos.map(p => photoImg(p.url)).join('')}</div>`;
                }
                return `<div style="display:flex;align-items:center;gap:8px;padding:4px 0;border-bottom:1px solid var(--border-light);cursor:pointer" onclick="openActivityModal('${a.id}')"><span class="category-icon">${catIcon}</span><div style="flex:1"><div style="font-size:13px;font-weight:500">${esc(a.name)}</div><div style="font-size:12px;color:var(--text-muted)">${a.time ? formatTime(a.time) : ''}${a.time && a.duration ? ' \u00B7 ' : ''}${a.duration ? formatDuration(a.duration) : ''}</div></div></div>${photoStrip}`;
            }).join('');
        }
        const collapsedContent = !isExpanded ? `<div style="font-size:12px;color:var(--text-muted);margin-top:4px">${actNames.length > 0 ? actNames.join(' &rarr; ') : 'No activities'}</div>` : '';
        return `<div class="card" style="margin-bottom:8px${opts?.archived ? ';opacity:0.7' : ''}"><div class="card-body">
            <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px">
                <div style="flex:1;cursor:pointer" onclick="${toggleExpand}">
                    <strong style="font-size:14px">${esc(dp.name || 'Unnamed Plan')}</strong>
                    ${dp.assignedDate ? `<span class="badge" style="font-size:10px;margin-left:6px;background:var(--accent);color:white">${formatDate(dp.assignedDate)}</span>` : ''}
                    ${opts?.legName ? `<span class="badge" style="font-size:10px;margin-left:6px;background:var(--bg-secondary)">${esc(opts.legName)}</span>` : ''}
                    ${opts?.usedDate ? `<span style="font-size:11px;color:var(--text-muted);margin-left:6px">used ${formatDate(opts.usedDate)}</span>` : ''}
                    ${collapsedContent}
                    ${dp.notes && !isExpanded ? `<div style="font-size:12px;color:var(--text-muted);margin-top:2px">${esc(dp.notes)}</div>` : ''}
                </div>
                <div style="display:flex;gap:4px;flex-shrink:0">
                    ${opts?.archived ? `<button class="btn btn-sm btn-ghost" onclick="unarchiveDayPlan('${dp.id}')">Restore</button>` : ''}
                    ${!opts?.archived && days.length > 0 ? `<select class="select" style="width:auto;height:30px;font-size:12px" onchange="if(this.value)useDayPlanForDate('${dp.id}',this.value)"><option value="">Use on\u2026</option>${days.map(d => `<option value="${d}">${formatDate(d)}</option>`).join('')}</select>` : ''}
                    <button class="btn btn-sm btn-ghost" onclick="openDayPlanModal('${dp.id}')">Edit</button>
                </div>
            </div>
            ${isExpanded ? `<div style="margin-top:8px;border-top:1px solid var(--border-light);padding-top:8px">${expandedBody}</div>` : ''}
        </div></div>`;
    }

    function renderItinerary() {
        const trip = getTrip(); const mc = document.getElementById('mainContent');
        if (!trip) { mc.innerHTML = '<div class="view-content"><div class="empty-state"><div class="empty-icon">\u{1F4C5}</div><p>No trip selected.</p></div></div>'; return; }
        const days = getDayRange(trip); const today = localDateStr(new Date());
        const _travelActive = isTravelMode();
        const filter = state.itineraryFilter; const mode = state.itineraryMode;
        const statusOpts = [{value:'',label:'All status'},{value:'booked',label:'Booked'},{value:'unbooked',label:'Unbooked'},{value:'visited',label:'Visited'}];
        const catOpts = [{value:'',label:'All categories'}].concat(Object.entries(CATEGORIES).map(([k,v]) => ({value:k,label:v+' '+k.charAt(0).toUpperCase()+k.slice(1)})));
        const _modeSegmented = `<div class="segmented" style="flex-shrink:0">
                <button class="segmented-btn${mode === 'ordered' ? ' active' : ''}" onclick="state.itineraryMode='ordered';render()">Ordered</button>
                <button class="segmented-btn${mode === 'unordered' ? ' active' : ''}" onclick="state.itineraryMode='unordered';render()">Unordered</button>
                <button class="segmented-btn${mode === 'dayplans' ? ' active' : ''}" onclick="state.itineraryMode='dayplans';render()">Day Plans</button>
            </div>`;
        let filterBarHTML = _travelActive ? `<div class="filter-bar">
            <select class="select" onchange="state.itineraryFilter.category=this.value||null;render()">${catOpts.map(o => `<option value="${o.value}"${o.value === (filter.category || '') ? ' selected' : ''}>${esc(o.label)}</option>`).join('')}</select>
            ${_modeSegmented}</div>` : `<div class="filter-bar">
            <select class="select" onchange="state.itineraryFilter.legId=this.value||null;render()">${legOptions(trip, filter.legId)}</select>
            <select class="select" onchange="state.itineraryFilter.category=this.value||null;render()">${catOpts.map(o => `<option value="${o.value}"${o.value === (filter.category || '') ? ' selected' : ''}>${esc(o.label)}</option>`).join('')}</select>
            <select class="select" onchange="state.itineraryFilter.status=this.value||null;render()">${statusOpts.map(o => `<option value="${o.value}"${o.value === (filter.status || '') ? ' selected' : ''}>${esc(o.label)}</option>`).join('')}</select>
            ${_modeSegmented}
        </div>`;
        let smartPasteBtn = _travelActive ? '' : `<div style="margin-bottom:12px;display:flex;gap:8px"><button class="btn btn-sm" onclick="openSmartPaste()">\u{1F4CB} Smart Paste</button></div>`;

        // In travel mode during/after trip, filter days to current leg + first day of next leg
        let travelFilteredDays = null;
        if (_travelActive && getTripTravelStatus(trip) !== 'pre' && days.length > 0) {
            const legs = (trip.legs || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
            const curLeg = getCurrentTravelLeg(trip);
            if (curLeg) {
                const curIdx = legs.findIndex(l => l.id === curLeg.id);
                const nextLeg = curIdx >= 0 && curIdx < legs.length - 1 ? legs[curIdx + 1] : null;
                const allowedDays = new Set();
                for (const d of days) { if (d >= curLeg.startDate && d <= curLeg.endDate) allowedDays.add(d); }
                if (nextLeg && nextLeg.startDate) allowedDays.add(nextLeg.startDate);
                travelFilteredDays = days.filter(d => allowedDays.has(d));
            } else {
                // Between legs (travel day): find prev leg (endDate < today) and next leg (startDate > today)
                let prevLeg = null, nextLeg = null;
                for (const leg of legs) {
                    if (leg.endDate && leg.endDate < today) prevLeg = leg;
                    if (!nextLeg && leg.startDate && leg.startDate > today) nextLeg = leg;
                }
                const allowedDays = new Set();
                if (prevLeg && prevLeg.endDate) allowedDays.add(prevLeg.endDate);
                if (nextLeg) { for (const d of days) { if (d >= nextLeg.startDate && d <= nextLeg.endDate) allowedDays.add(d); } }
                travelFilteredDays = days.filter(d => allowedDays.has(d));
            }
        }

        if (mode === 'unordered') {
            let html = `<div class="view-content">${filterBarHTML}${smartPasteBtn}`;
            const legs = (trip.legs || []).slice().sort((a,b) => (a.order||0)-(b.order||0));
            const filteredLegs = filter.legId ? legs.filter(l => l.id === filter.legId) : legs;
            if (filteredLegs.length === 0) html += `<div class="empty-state"><p>No legs to show.</p></div>`;
            const assignedActIds = new Set();
            for (const leg of filteredLegs) {
                let acts = (trip.activities || []).filter(a => {
                    if (a.legId === leg.id) return true;
                    if (!a.legId && a.date && leg.startDate && leg.endDate && a.date >= leg.startDate && a.date <= leg.endDate) return true;
                    return false;
                });
                acts.forEach(a => assignedActIds.add(a.id));
                acts = _applyActivityFilters(acts, filter);
                acts.sort((a,b) => (a.order||0)-(b.order||0));
                html += `<div class="card" style="margin-bottom:12px"><div class="card-header"><strong>${esc(leg.city)}${leg.country ? ', '+esc(leg.country) : ''}</strong><span style="font-size:13px;color:var(--text-muted)">${formatDateRange(leg.startDate,leg.endDate)}</span></div><div class="card-body">`;
                if (acts.length === 0) html += `<p style="color:var(--text-muted);font-size:13px">No activities for this leg.</p>`;
                else { html += `<ul class="item-list">`; for (const act of acts) html += _renderActivityRow(act, trip, null, null); html += `</ul>`; }
                html += `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openActivityModal(null,null,'${leg.id}')">+ Activity</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openLodgingModalForDate('','${leg.id}')">+ Lodging</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openTransportModalForDate('')">+ Transport</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openHotelOptionModalForCity('${leg.id}')">+ Hotel Option</button></div>`;
                html += `</div></div>`;
            }
            let noLegActs = (trip.activities || []).filter(a => !a.legId && !assignedActIds.has(a.id));
            noLegActs = _applyActivityFilters(noLegActs, filter);
            if (noLegActs.length > 0) {
                html += `<div class="card" style="margin-bottom:12px"><div class="card-header"><strong>Unassigned</strong></div><div class="card-body"><ul class="item-list">`;
                for (const act of noLegActs) html += _renderActivityRow(act, trip, null, null);
                html += `</ul><div style="margin-top:6px"><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openActivityModal()">+ Activity</button></div></div></div>`;
            }
            html += `</div><button class="fab" onclick="openActivityModal()" title="Add Activity">+</button>`;
            mc.innerHTML = html; return;
        }

        if (mode === 'dayplans') {
            let html = `<div class="view-content">${filterBarHTML}`;
            const allPlans = (trip.dayPlans || []);
            const legs = (trip.legs || []).slice().sort((a,b) => (a.order||0)-(b.order||0));
            let filteredLegs = filter.legId ? legs.filter(l => l.id === filter.legId) : legs;
            if (_travelActive && getTripTravelStatus(trip) !== 'pre') {
                const _curLeg = getCurrentTravelLeg(trip);
                const _travelLegIds = new Set();
                if (_curLeg) {
                    _travelLegIds.add(_curLeg.id);
                    const _ci = legs.findIndex(l => l.id === _curLeg.id);
                    if (_ci >= 0 && _ci < legs.length - 1) _travelLegIds.add(legs[_ci + 1].id);
                } else {
                    for (const leg of legs) {
                        if (leg.startDate && leg.startDate > today) { _travelLegIds.add(leg.id); break; }
                    }
                }
                if (_travelLegIds.size > 0) filteredLegs = filteredLegs.filter(l => _travelLegIds.has(l.id));
            }
            const floatingPlans = allPlans.filter(dp => !dp.usedDate);
            const archivedPlans = allPlans.filter(dp => dp.usedDate);

            html += `<div style="margin-bottom:12px;display:flex;gap:8px"><button class="btn btn-sm btn-primary" onclick="openDayPlanModal()">+ New Day Plan</button></div>`;

            if (floatingPlans.length === 0 && archivedPlans.length === 0) {
                html += `<div class="empty-state"><div class="empty-icon">\u{1F4CB}</div><p>No day plans yet. Create a day plan to organize activities into reusable daily itineraries.</p></div>`;
            } else {
                for (const leg of filteredLegs) {
                    const legPlans = floatingPlans.filter(dp => dp.legId === leg.id);
                    if (legPlans.length === 0) continue;
                    html += `<h3 style="font-size:14px;color:var(--text-muted);margin:16px 0 8px">${esc(leg.city)}</h3>`;
                    for (const dp of legPlans) {
                        html += _renderDayPlanCard(dp, trip, days, {});
                    }
                }

                const unassignedPlans = floatingPlans.filter(dp => !dp.legId || !legs.some(l => l.id === dp.legId));
                if (unassignedPlans.length > 0) {
                    html += `<h3 style="font-size:14px;color:var(--text-muted);margin:16px 0 8px">Unassigned</h3>`;
                    for (const dp of unassignedPlans) {
                        html += _renderDayPlanCard(dp, trip, days, {});
                    }
                }

                if (archivedPlans.length > 0) {
                    const filteredArchived = filter.legId ? archivedPlans.filter(dp => dp.legId === filter.legId) : archivedPlans;
                    if (filteredArchived.length > 0) {
                        html += `<details style="margin-top:16px"><summary style="font-size:14px;color:var(--text-muted);cursor:pointer">Archived (${filteredArchived.length})</summary><div style="margin-top:8px">`;
                        for (const dp of filteredArchived) {
                            const legName = legs.find(l => l.id === dp.legId)?.city || '';
                            html += _renderDayPlanCard(dp, trip, days, { archived: true, legName, usedDate: dp.usedDate });
                        }
                        html += `</div></details>`;
                    }
                }
            }

            html += `</div><button class="fab" onclick="openDayPlanModal()" title="New Day Plan">+</button>`;
            mc.innerHTML = html; return;
        }

        let dayCardsHTML = '';
        const _renderDays = travelFilteredDays || days;
        if (_renderDays.length === 0) { dayCardsHTML = `<div class="empty-state" style="padding:24px 0"><p>Set trip dates to see your day-by-day itinerary.</p></div>`; }
        else {
            // When filtering by leg, show inbound/outbound transport banners
            let _legFilterInbound = null, _legFilterOutbound = null;
            if (!_travelActive && filter.legId) {
                const _allLegs = (trip.legs || []).slice().sort((a,b) => (a.order||0)-(b.order||0));
                const _selIdx = _allLegs.findIndex(l => l.id === filter.legId);
                const _selLeg = _selIdx >= 0 ? _allLegs[_selIdx] : null;
                if (_selLeg) {
                    const _prevCity = _selIdx > 0 ? _allLegs[_selIdx - 1].city : trip.startLocation;
                    const _nextCity = _selIdx < _allLegs.length - 1 ? _allLegs[_selIdx + 1].city : trip.endLocation;
                    if (_prevCity && _selLeg.city && _prevCity.toLowerCase() !== _selLeg.city.toLowerCase()) _legFilterInbound = { from: _prevCity, to: _selLeg.city, dateHint: _selLeg.startDate || '' };
                    if (_nextCity && _selLeg.city && _nextCity.toLowerCase() !== _selLeg.city.toLowerCase()) _legFilterOutbound = { from: _selLeg.city, to: _nextCity, dateHint: _selLeg.endDate || '' };
                }
            }

            if (_legFilterInbound) dayCardsHTML += renderTravelBanner(trip, _legFilterInbound.from, _legFilterInbound.to, _legFilterInbound.dateHint);

            let prevCity = null;
            let shownStartBanner = false;
            for (let i = 0; i < _renderDays.length; i++) {
                const dateStr = _renderDays[i]; const leg = getLegForDate(trip, dateStr);
                if (!_travelActive && filter.legId && (!leg || leg.id !== filter.legId)) continue;
                const _dayNum = days.indexOf(dateStr);
                const curCity = leg ? leg.city : null;
                if (!_legFilterInbound) {
                    if (!shownStartBanner && curCity && trip.startLocation && trip.startLocation.toLowerCase() !== curCity.toLowerCase()) {
                        dayCardsHTML += renderTravelBanner(trip, trip.startLocation, curCity, _renderDays[0]);
                        shownStartBanner = true;
                    } else if (!shownStartBanner) { shownStartBanner = true; }
                    if (prevCity && curCity && prevCity.toLowerCase() !== curCity.toLowerCase()) {
                        dayCardsHTML += renderTravelBanner(trip, prevCity, curCity, dateStr);
                    }
                } else { shownStartBanner = true; }
                prevCity = curCity;
                const events = getEventsForDate(trip, dateStr); const collapsed = state.collapsedDays[dateStr];
                const d = new Date(dateStr + 'T00:00:00'); const dayOfWeek = d.toLocaleDateString('en-US',{weekday:'long'});
                const isToday = dateStr === today;
                let filteredActs = _applyActivityFilters(events.activities, filter);
                filteredActs = _sortActivitiesForDate(filteredActs, dateStr, today, events.dayPlans);
                const legLabel = leg ? esc(leg.city) : '';
                const todayBadge = isToday ? ' <span class="badge badge-in-progress" style="font-size:10px;margin-left:6px">Today</span>' : '';
                const usedPlan = (trip.dayPlans || []).find(dp => dp.usedDate === dateStr);
                const planBadge = usedPlan ? ` <span style="font-size:11px;color:var(--purple)">&middot; ${esc(usedPlan.name)}</span>` : '';
                dayCardsHTML += `<div class="card day-card" ${isToday ? 'style="border-left:3px solid var(--purple)"' : ''} ondragover="event.preventDefault()" ondrop="var aid=event.dataTransfer.getData('application/x-activity-id');if(aid){event.stopPropagation();moveActivityToDate(aid,'${dateStr}')}">
                    <div class="day-card-header" onclick="toggleDayCollapsed('${dateStr}')">
                        <div><div class="day-title">Day ${_dayNum+1} &mdash; ${formatDate(dateStr)}${todayBadge}</div><div class="day-subtitle">${dayOfWeek}${legLabel ? ' &middot; '+legLabel : ''}${planBadge}</div></div>
                        <span style="font-size:18px;transition:transform .2s;${collapsed ? '' : 'transform:rotate(180deg)'}">\u25BC</span>
                    </div>`;
                if (!collapsed) {
                    dayCardsHTML += `<div class="card-body" style="padding:8px 16px 12px" ondragover="event.preventDefault();this.style.outline='2px solid var(--purple)'" ondragleave="this.style.outline=''" ondrop="event.stopPropagation();this.style.outline='';var aid=event.dataTransfer.getData('application/x-activity-id');if(aid)moveActivityToDate(aid,'${dateStr}')">`;
                    for (const t of events.transport) {
                        const icon = TRANSPORT_TYPES[t.type] || '\u{1F690}'; const timeStr = t.departure ? formatTime(t.departure.split('T')[1]?.substring(0,5)||'') : '';
                        dayCardsHTML += `<div class="item-row" style="margin-bottom:6px;cursor:pointer" onclick="openTransportModal('${t.id}')"><span class="category-icon">${icon}</span><div class="item-body"><div class="item-title">${esc(t.carrier||'')} ${esc(t.flightNumber||'')} ${esc(t.fromCity||'')} \u2192 ${esc(t.toCity||'')}</div><div class="item-meta">${timeStr ? '<span>'+timeStr+'</span>' : ''}</div></div><div class="item-actions">${t.booked ? '<span class="badge badge-ready" style="font-size:10px">Booked</span>' : '<span class="badge badge-booking" style="font-size:10px">Unbooked</span>'}</div></div>`;
                    }
                    for (const l of events.lodging) {
                        const label = (l.checkIn===dateStr && l.checkOut===dateStr) ? 'Check-in / Check-out' : l.checkIn===dateStr ? 'Check-in' : 'Check-out';
                        dayCardsHTML += `<div class="item-row" style="margin-bottom:6px;cursor:pointer" onclick="openLodgingModal('${l.id}')"><span class="category-icon">\u{1F3E8}</span><div class="item-body"><div class="item-title">${esc(label)}: ${esc(l.name)}</div></div><div class="item-actions">${l.booked ? '<span class="badge badge-ready" style="font-size:10px">Booked</span>' : '<span class="badge badge-booking" style="font-size:10px">Unbooked</span>'}</div></div>`;
                    }
                    if (filteredActs.length > 0) {
                        const dayPlan = events.dayPlans[0] || null;
                        dayCardsHTML += `<ul class="item-list">`;
                        for (let j = 0; j < filteredActs.length; j++) dayCardsHTML += _renderActivityRow(filteredActs[j], trip, dateStr, dayPlan ? j+1 : null);
                        dayCardsHTML += `</ul>`;
                    } else if (events.transport.length === 0 && events.lodging.length === 0) {
                        dayCardsHTML += `<p style="color:var(--text-muted);font-size:13px;padding:4px 0">No events for this day.</p>`;
                    }
                    if (!_travelActive && leg && !hasBookedLodgingForNight(trip, dateStr)) {
                        const dayHotelOpts = (trip.hotelOptions || []).filter(ho => ho.city === leg.city);
                        if (dayHotelOpts.length > 0) {
                            dayCardsHTML += `<details style="margin-top:8px;margin-bottom:4px"><summary style="font-size:12px;color:var(--text-muted);cursor:pointer">Hotel options for ${esc(leg.city)} (${dayHotelOpts.length})</summary><div style="margin-top:6px">`;
                            for (const ho of dayHotelOpts) {
                                const costStr = ho.cost != null ? formatCurrency(ho.cost, ho.currency) + '/night' : '';
                                const linkStr = ho.link ? ` <a href="${esc(ho.link)}" target="_blank" rel="noopener" style="font-size:11px;color:var(--purple)" onclick="event.stopPropagation()">link</a>` : '';
                                dayCardsHTML += `<div style="display:flex;align-items:center;flex-wrap:wrap;gap:6px;padding:4px 0;font-size:13px"><div style="flex:1;min-width:0"><strong>${esc(ho.name)}</strong>${costStr ? ` <span style="color:var(--text-muted)">${costStr}</span>` : ''}${linkStr}</div><button class="btn btn-sm" style="font-size:11px;padding:2px 8px;flex-shrink:0" onclick="openQuickBookModal('${esc(ho.id)}','${dateStr}')">Book</button></div>`;
                            }
                            dayCardsHTML += `</div></details>`;
                        }
                    }
                    if (leg) {
                        const availablePlans = (trip.dayPlans || []).filter(dp => dp.legId === leg.id && !dp.usedDate && !dp.assignedDate);
                        if (availablePlans.length > 0) {
                            dayCardsHTML += `<details style="margin-top:8px;margin-bottom:4px"><summary style="font-size:12px;color:var(--purple);cursor:pointer;font-weight:600">Day plans for ${esc(leg.city)} (${availablePlans.length})</summary><div style="margin-top:6px">`;
                            for (const dp of availablePlans) {
                                const actNames = (dp.activityIds || []).map(aid => { const a = (trip.activities || []).find(x => x.id === aid); return a ? esc(a.name) : '?'; });
                                dayCardsHTML += `<div class="card" style="margin-bottom:6px;border:1px solid var(--border)"><div class="card-body" style="padding:8px 12px"><div style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><strong style="font-size:13px">${esc(dp.name)}</strong><div style="font-size:12px;color:var(--text-muted);margin-top:2px">${actNames.length > 0 ? actNames.join(' \u2192 ') : 'No activities'}</div>${dp.notes ? `<div style="font-size:11px;color:var(--text-light);margin-top:2px">${esc(dp.notes)}</div>` : ''}</div><div style="display:flex;gap:4px;flex-shrink:0"><button class="btn btn-sm btn-primary" style="font-size:11px" onclick="useDayPlanForDate('${dp.id}','${dateStr}')">Use</button><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="openDayPlanModal('${dp.id}')">Edit</button></div></div></div></div>`;
                            }
                            dayCardsHTML += `</div></details>`;
                        }
                    }
                    if (!_travelActive) {
                        const addLegId = leg ? leg.id : '';
                        dayCardsHTML += `<div style="margin-top:6px;display:flex;gap:4px;flex-wrap:wrap"><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openActivityModalForDate('${dateStr}','${addLegId}')">+ Activity</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openLodgingModalForDate('${dateStr}','${addLegId}')">+ Lodging</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openTransportModalForDate('${dateStr}')">+ Transport</button><button class="btn btn-sm btn-ghost" style="font-size:12px" onclick="openHotelOptionModalForCity('${addLegId}')">+ Hotel Option</button></div>`;
                    }
                    dayCardsHTML += `</div>`;
                }
                dayCardsHTML += `</div>`;
            }
            if (_legFilterOutbound) {
                dayCardsHTML += renderTravelBanner(trip, _legFilterOutbound.from, _legFilterOutbound.to, _legFilterOutbound.dateHint);
            } else if (prevCity && trip.endLocation && trip.endLocation.toLowerCase() !== prevCity.toLowerCase()) {
                dayCardsHTML += renderTravelBanner(trip, prevCity, trip.endLocation, _renderDays[_renderDays.length - 1]);
            }
        }

        let floatingHTML = '';
        let poolHTML = '';
        if (!_travelActive) {
            const floatingPlans = (trip.dayPlans || []).filter(dp => !dp.assignedDate && !dp.usedDate);
            const usedPlans = (trip.dayPlans || []).filter(dp => dp.usedDate);
            if (floatingPlans.length > 0) {
                floatingHTML += `<div style="margin-top:16px"><h3 style="font-size:14px;color:var(--text-muted);margin-bottom:8px">Floating Day Plans</h3>`;
                for (const dp of floatingPlans) {
                    const actNames = (dp.activityIds || []).map(aid => { const a = (trip.activities || []).find(x => x.id === aid); return a ? esc(a.name) : '?'; }).join(', ');
                    const legName = (trip.legs || []).find(l => l.id === dp.legId)?.city || '';
                    floatingHTML += `<div class="card" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><strong style="font-size:14px">${esc(dp.name || 'Unnamed Plan')}</strong>${legName ? `<span class="badge" style="font-size:10px;margin-left:6px;background:var(--bg-secondary)">${esc(legName)}</span>` : ''}<div style="font-size:12px;color:var(--text-muted)">${actNames || 'No activities'}</div></div><div style="display:flex;gap:4px"><button class="btn btn-sm btn-ghost" onclick="openDayPlanModal('${dp.id}')">Edit</button>${days.length > 0 ? `<select class="select" style="width:auto;height:30px;font-size:12px" onchange="if(this.value)useDayPlanForDate('${dp.id}',this.value)"><option value="">Use on...</option>${days.map(d => `<option value="${d}">${formatDate(d)}</option>`).join('')}</select>` : ''}</div></div></div>`;
                }
                floatingHTML += `</div>`;
            }
            if (usedPlans.length > 0) {
                floatingHTML += `<details style="margin-top:16px"><summary style="font-size:14px;color:var(--text-muted);cursor:pointer">Archived Day Plans (${usedPlans.length})</summary><div style="margin-top:8px">`;
                for (const dp of usedPlans) {
                    const actNames = (dp.activityIds || []).map(aid => { const a = (trip.activities || []).find(x => x.id === aid); return a ? esc(a.name) : '?'; }).join(', ');
                    floatingHTML += `<div class="card" style="margin-bottom:8px;opacity:0.7"><div class="card-body" style="display:flex;justify-content:space-between;align-items:center;gap:8px"><div><strong style="font-size:14px">${esc(dp.name || 'Unnamed Plan')}</strong><span style="font-size:11px;color:var(--text-muted);margin-left:6px">used ${formatDate(dp.usedDate)}</span><div style="font-size:12px;color:var(--text-muted)">${actNames || 'No activities'}</div></div><div style="display:flex;gap:4px"><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="unarchiveDayPlan('${dp.id}')">Restore</button><button class="btn btn-sm btn-ghost" style="font-size:11px" onclick="openDayPlanModal('${dp.id}')">Edit</button></div></div></div>`;
                }
                floatingHTML += `</div></details>`;
            }

            let pooledActs = (trip.activities || []).filter(a => a.isPooled);
            const assignedPooledIds = new Set();
            for (const dp of trip.dayPlans || []) { if (dp.assignedDate) for (const aid of dp.activityIds || []) assignedPooledIds.add(aid); }
            pooledActs = pooledActs.filter(a => !a.date && !assignedPooledIds.has(a.id));
            const usedOptionGroupIds = new Set();
            for (const a of trip.activities || []) { if (a.optionGroupId && a.visited) usedOptionGroupIds.add(a.optionGroupId); }
            pooledActs = pooledActs.filter(a => {
                if (!a.optionGroupId || !usedOptionGroupIds.has(a.optionGroupId)) return true;
                return a.visited;
            });
            pooledActs = _applyActivityFilters(pooledActs, filter);
            if (pooledActs.length > 0) {
                poolHTML += `<div style="margin-top:16px"><h3 style="font-size:14px;color:var(--text-muted);margin-bottom:8px">Pool (use any day)</h3><div class="card"><div class="card-body"><ul class="item-list">`;
                for (const act of pooledActs) poolHTML += _renderActivityRow(act, trip, null, null);
                poolHTML += `</ul></div></div></div>`;
            }
        }

        const _itinFab = _travelActive ? '' : `<button class="fab" onclick="openActivityModal()" title="Add Activity">+</button>`;
        mc.innerHTML = `<div class="view-content">${filterBarHTML}${smartPasteBtn}${dayCardsHTML}${floatingHTML}${poolHTML}</div>${_itinFab}`;
    }

    function _applyActivityFilters(activities, filter) {
        let result = activities;
        if (filter.category) result = result.filter(a => a.category === filter.category);
        if (filter.status === 'booked') result = result.filter(a => a.booked);
        else if (filter.status === 'unbooked') result = result.filter(a => a.reservationNeeded && !a.booked);
        else if (filter.status === 'visited') result = result.filter(a => a.visited);
        return result;
    }

    function _sortActivitiesForDate(activities, dateStr, today, dayPlans) {
        const isDismissed = (a) => state.dismissedActivities.has(a.id);
        if (dateStr === today) {
            const now = new Date(); const nowMin = now.getHours()*60+now.getMinutes();
            const upcoming=[],unscheduled=[],dismissed=[],visited=[];
            for (const a of activities) {
                if (a.visited) visited.push(a);
                else if (isDismissed(a)) dismissed.push(a);
                else if (a.time) upcoming.push(a);
                else unscheduled.push(a);
            }
            upcoming.sort((a,b) => { if (!a.time&&!b.time) return 0; if (!a.time) return 1; if (!b.time) return -1; return a.time.localeCompare(b.time); });
            return [...upcoming,...unscheduled,...dismissed,...visited];
        } else if (dateStr < today) {
            return [...activities.filter(a=>a.visited),...activities.filter(a=>!a.visited)];
        } else {
            if (dayPlans?.length > 0) {
                const dp = dayPlans[0]; const orderMap = {};
                (dp.activityIds||[]).forEach((aid,idx) => { orderMap[aid]=idx; });
                return activities.slice().sort((a,b) => { const oa=orderMap[a.id]!==undefined?orderMap[a.id]:9999; const ob=orderMap[b.id]!==undefined?orderMap[b.id]:9999; if(oa!==ob)return oa-ob; return(a.order||0)-(b.order||0); });
            }
            return activities.slice().sort((a,b) => { if(a.time&&b.time)return a.time.localeCompare(b.time); if(a.time)return-1; if(b.time)return 1; return(a.order||0)-(b.order||0); });
        }
    }

    function moveActivityToDate(actId, newDate) {
        const trip = getTrip(); if (!trip) return;
        const act = (trip.activities || []).find(a => a.id === actId);
        if (!act) return;
        const oldDate = act.date;
        act.date = newDate;
        const newLeg = getLegForDate(trip, newDate);
        if (newLeg) act.legId = newLeg.id;
        for (const dp of trip.dayPlans || []) {
            if (dp.assignedDate === oldDate) dp.activityIds = (dp.activityIds || []).filter(id => id !== actId);
        }
        const targetDp = (trip.dayPlans || []).find(dp => dp.assignedDate === newDate);
        if (targetDp && !(targetDp.activityIds || []).includes(actId)) {
            if (!targetDp.activityIds) targetDp.activityIds = [];
            targetDp.activityIds.push(actId);
        }
        save(); render(); toast(`Moved to ${formatDate(newDate)}`);
    }

        const icon = CATEGORIES[act.category] || '\u{1F4CC}';
        const isDismissed = state.dismissedActivities.has(act.id);

        if (act.optionGroupId) {

        }
        const rowCls = ['item-row',!act.booked&&act.reservationNeeded?'unbooked':'',isVisited?'visited':'',isDimmedAlt?'dimmed':'',isDismissed?'dimmed':''].filter(Boolean).join(' ');
        const meta = []; if(act.time)meta.push(formatTime(act.time)); if(act.duration)meta.push(formatDuration(act.duration)); if(act.cost)meta.push(formatCurrency(act.cost,act.currency)); if(act.reservationNeeded&&!act.booked)meta.push('Needs booking');
        let ratingHTML = '';
        if (isVisited && act.rating) { ratingHTML='<span class="rating" style="margin-left:4px">'; for(let s=1;s<=5;s++)ratingHTML+=`<span class="star${s<=act.rating?' filled':''}">★</span>`; ratingHTML+='</span>'; }
        let reorderHTML = '';
        if (seqNum !== null && dateStr) { const dp = (trip.dayPlans||[]).find(d=>d.assignedDate===dateStr); if(dp?.activityIds?.length>1){ const idx=dp.activityIds.indexOf(act.id); if(idx>=0) reorderHTML=`<button class="btn-icon btn-sm" style="font-size:12px" onclick="event.stopPropagation();reorderDayActivities('${dp.id}',${idx},${Math.max(0,idx-1)})" ${idx===0?'disabled':''}>↑</button><button class="btn-icon btn-sm" style="font-size:12px" onclick="event.stopPropagation();reorderDayActivities('${dp.id}',${idx},${Math.min(dp.activityIds.length-1,idx+1)})" ${idx===dp.activityIds.length-1?'disabled':''}>↓</button>`; } }
        const today2 = localDateStr(new Date());
        let dismissHTML = '';
        if (dateStr===today2 && !isVisited) { dismissHTML = isDismissed ? `<button class="btn-icon btn-sm" title="Restore" onclick="event.stopPropagation();undismissActivity('${act.id}')" style="font-size:12px">\u21A9</button>` : `<button class="btn-icon btn-sm" title="Skip" onclick="event.stopPropagation();dismissActivity('${act.id}')" style="font-size:12px">\u2715</button>`; }
        let photoStripHTML = '';
        if (settings.showPhotos && act.photos?.length > 0) {
            photoStripHTML = `<div style="display:flex;gap:4px;margin-top:4px;overflow-x:auto">${act.photos.map(p => photoImg(p.url)).join('')}</div>`;
        }
        return `<li class="${rowCls}" style="cursor:pointer" draggable="true" ondragstart="event.dataTransfer.setData('application/x-activity-id','${act.id}');event.dataTransfer.effectAllowed='move'" onclick="openActivityModal('${act.id}')"><div class="item-check"><input type="checkbox" ${isVisited?'checked':''} onclick="event.stopPropagation();toggleActivityVisited('${act.id}')"></div>${seqNum!==null?`<span style="font-size:12px;color:var(--text-light);font-weight:600;min-width:20px">${seqNum}.</span>`:''}<span class="category-icon">${icon}</span><div class="item-body"><div class="item-title">${esc(act.name)}${optGroupLabel}${ratingHTML}</div><div class="item-meta">${meta.map(m=>`<span>${m}</span>`).join('')}</div>${photoStripHTML}</div><div class="item-actions">${dismissHTML}${reorderHTML}</div></li>`;
    }

    function _doSmartParse() {

    function parseBookingText(text) {
        const result = { dates:[], times:[], confirmationCodes:[], addresses:[], carriers:[], flightNumbers:[], itemType:null, transportType:null };
        if (!text) return result;
        const monthNames = 'Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec|January|February|March|April|May|June|July|August|September|October|November|December';
        const monthMap = {};
        'jan,feb,mar,apr,may,jun,jul,aug,sep,oct,nov,dec'.split(',').forEach((m,i)=>{monthMap[m]=i+1;});
        'january,february,march,april,may,june,july,august,september,october,november,december'.split(',').forEach((m,i)=>{monthMap[m]=i+1;});
        let m;
        const re1 = new RegExp('('+monthNames+')\\s+(\\d{1,2})(?:,?\\s+(\\d{4}))?','gi');
        while((m=re1.exec(text))!==null){const mon=monthMap[m[1].toLowerCase()];const day=parseInt(m[2]);const year=m[3]?parseInt(m[3]):new Date().getFullYear();if(mon&&day>=1&&day<=31)result.dates.push(`${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`);}
        const re2 = new RegExp('(\\d{1,2})\\s+('+monthNames+')(?:,?\\s+(\\d{4}))?','gi');
        while((m=re2.exec(text))!==null){const day=parseInt(m[1]);const mon=monthMap[m[2].toLowerCase()];const year=m[3]?parseInt(m[3]):new Date().getFullYear();if(mon&&day>=1&&day<=31)result.dates.push(`${year}-${String(mon).padStart(2,'0')}-${String(day).padStart(2,'0')}`);}
        const re3=/(\d{4})-(\d{2})-(\d{2})/g;
        while((m=re3.exec(text))!==null){const y=parseInt(m[1]),mo=parseInt(m[2]),d=parseInt(m[3]);if(y>=2020&&y<=2099&&mo>=1&&mo<=12&&d>=1&&d<=31)result.dates.push(m[0]);}
        const re4=/(\d{2})\/(\d{2})\/(\d{4})/g;
        while((m=re4.exec(text))!==null){const a=parseInt(m[1]),b=parseInt(m[2]),y=parseInt(m[3]);if(y>=2020&&y<=2099){if(a>12&&b<=12)result.dates.push(`${y}-${String(b).padStart(2,'0')}-${String(a).padStart(2,'0')}`);else if(b>12&&a<=12)result.dates.push(`${y}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`);else result.dates.push(`${y}-${String(a).padStart(2,'0')}-${String(b).padStart(2,'0')}`);}}
        result.dates=[...new Set(result.dates)];
        const timeRe=/\b(\d{1,2}):(\d{2})(?:\s*(AM|PM|am|pm))?\b/g;
        while((m=timeRe.exec(text))!==null){let h=parseInt(m[1]);const min=parseInt(m[2]);const ampm=m[3]?m[3].toUpperCase():null;if(ampm==='PM'&&h<12)h+=12;if(ampm==='AM'&&h===12)h=0;if(h>=0&&h<=23&&min>=0&&min<=59)result.times.push(`${String(h).padStart(2,'0')}:${String(min).padStart(2,'0')}`);}
        result.times=[...new Set(result.times)];
        const confRe=/\b([A-Z0-9][A-Z0-9\-]{5,}[A-Z0-9])\b/g;
        while((m=confRe.exec(text))!==null){if(!/^\d+$/.test(m[1])&&m[1].length<=20)result.confirmationCodes.push(m[1]);}
        result.confirmationCodes=[...new Set(result.confirmationCodes)];
        const addrRe=/^.*\d+\s+.*\b(St|Street|Ave|Avenue|Rd|Road|Blvd|Boulevard|Way|Dr|Drive|Lane|Ln|Ct|Court|Pl|Place)\b.*$/gim;
        while((m=addrRe.exec(text))!==null)result.addresses.push(m[0].trim());
        result.addresses=[...new Set(result.addresses)];
        const airlines=['Delta','United','American Airlines','American','Southwest','JetBlue','Spirit','Alaska Airlines','British Airways','Lufthansa','Air France','Ryanair','EasyJet','Emirates','Qatar Airways','Singapore Airlines','KLM','Iberia','Qantas','Turkish Airlines','Korean Air','Air Canada'];
        const hotels=['Marriott','Hilton','Hyatt','IHG','Best Western','Airbnb','Booking.com','Holiday Inn','Sheraton','Westin','Radisson','Four Seasons','Ritz-Carlton','VRBO','Hostelworld'];
        const tl=text.toLowerCase();
        for(const n of airlines)if(tl.includes(n.toLowerCase()))result.carriers.push(n);
        for(const n of hotels)if(tl.includes(n.toLowerCase()))result.carriers.push(n);
        result.carriers=[...new Set(result.carriers)];
        const flightRe=/\b([A-Z]{2})\s?(\d{1,4})\b/g;
        while((m=flightRe.exec(text))!==null)result.flightNumbers.push(m[1]+m[2]);
        result.flightNumbers=[...new Set(result.flightNumbers)];
        if(/\b(flight|airline|boarding pass|departure gate|terminal)\b/i.test(text)){result.itemType='transport';result.transportType='flight';}
        else if(/\b(hotel|check[\s-]?in|check[\s-]?out|room\s+(type|number|rate)|accommodation|hostel|resort)\b/i.test(text))result.itemType='lodging';
        else if(/\b(train|rail|railway|platform|amtrak|eurostar|renfe|sncf|trenitalia)\b/i.test(text)){result.itemType='transport';result.transportType='train';}
        else if(/\b(bus|greyhound|flixbus|megabus)\b/i.test(text)){result.itemType='transport';result.transportType='bus';}
        else if(/\b(ferry|cruise|ship|sailing)\b/i.test(text)){result.itemType='transport';result.transportType='ferry';}
        else if(/\b(reservation|booking|ticket|admission|tour|museum|activity)\b/i.test(text))result.itemType='activity';
        if(!result.itemType&&result.flightNumbers.length>0){result.itemType='transport';result.transportType='flight';}
        if(!result.itemType){const hotelSet=new Set(hotels.map(n=>n.toLowerCase()));if(result.carriers.some(c=>hotelSet.has(c.toLowerCase())))result.itemType='lodging';}
        return result;
    }

        const mc = document.getElementById('mainContent');

        if (!trip) {
            mc.innerHTML = '<div class="view-content"><div class="empty-state"><div class="empty-icon">🗺️</div><p>No trip selected.</p></div></div>';
            return;
        }

        const legs = (trip.legs || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        const days = getDayRange(trip);
        const _travelActive = isTravelMode();
        const _tripStatus = getTripTravelStatus(trip);

        // In travel mode, default to current leg + current day on first render
        if (_travelActive && _tripStatus === 'during' && !state.mapFilter._travelDefaultsApplied) {
            const curLeg = getCurrentTravelLeg(trip);
            const _today = localDateStr(new Date());
            if (curLeg) state.mapFilter.legId = curLeg.id;
            if (days.includes(_today)) state.mapFilter.dayDate = _today;
            state.mapFilter._travelDefaultsApplied = true;
        }

        const selectedLegId = state.mapFilter.legId;
        const selectedDayDate = state.mapFilter.dayDate;
        const selectedDayPlanId = state.mapFilter.dayPlanId;
        const selectedCategory = state.mapFilter.category;

        const dayPlans = (trip.dayPlans || []).filter(dp => !selectedLegId || dp.legId === selectedLegId);

        // Day filter: itinerary days, optionally filtered by selected leg
        let filteredDays = days;
        if (selectedLegId) {
            filteredDays = days.filter(d => { const leg = getLegForDate(trip, d); return leg && leg.id === selectedLegId; });
        }

        let html = '<div class="view-content">';
        html += '<div class="filter-bar" style="gap:4px">';

        // Day filter (itinerary days)
        html += `<select class="select" style="min-width:0" onchange="state.mapFilter.dayDate=this.value||null;if(this.value)state.mapFilter.dayPlanId=null;render()">`;
        html += `<option value="">All days</option>`;
        filteredDays.forEach((d, i) => {
            const dayNum = days.indexOf(d) + 1;
            html += `<option value="${d}"${d === selectedDayDate ? ' selected' : ''}>Day ${dayNum} – ${formatDate(d)}</option>`;
        });
        html += '</select>';

        // Day plan filter
        html += `<select class="select" style="min-width:0" onchange="state.mapFilter.dayPlanId=this.value||null;if(this.value)state.mapFilter.dayDate=null;render()">`;
        html += `<option value="">All plans</option>`;
        dayPlans.forEach(dp => {
            const label = dp.name || (dp.assignedDate ? formatDate(dp.assignedDate) : dp.id);
            html += `<option value="${esc(dp.id)}"${dp.id === selectedDayPlanId ? ' selected' : ''}>${esc(label)}</option>`;
        });
        html += '</select>';

        // Leg filter
        html += `<select class="select" style="min-width:0" onchange="state.mapFilter.legId=this.value||null;state.mapFilter.dayPlanId=null;state.mapFilter.dayDate=null;render()">`;
        html += `<option value="">All legs</option>`;
        legs.forEach(l => {
            html += `<option value="${esc(l.id)}"${l.id === selectedLegId ? ' selected' : ''}>${esc(l.city)}</option>`;
        });
        html += '</select>';

        // Route toggle
        html += `<button class="btn btn-sm${state.mapFilter.showTripRoute ? ' btn-primary' : ''}" style="flex-shrink:0" onclick="state.mapFilter.showTripRoute=!state.mapFilter.showTripRoute;render()" title="Show route between cities">🛤️ Route</button>`;
        html += '</div>';

        html += '<div class="map-wrapper"><div id="mapContainer"></div></div>';

        // Export GPX + category filter row
        html += `<div style="display:flex;gap:6px;align-items:center;margin-bottom:16px;flex-wrap:wrap">`;
        html += `<button class="btn btn-sm" onclick="exportGPX()">📥 Export GPX</button>`;
        if (window.__ANDROID_APP__ && settings.showOfflineMaps) {
            html += `<button class="btn btn-sm" onclick="openOfflineMapsModal()">📶 Offline Maps</button>`;
        }
        html += `<select class="select" style="min-width:0;flex:1" onchange="state.mapFilter.category=this.value||null;render()">`;
        html += `<option value="">All categories</option>`;
        Object.entries(CATEGORIES).forEach(([k, v]) => {
            html += `<option value="${esc(k)}"${k === selectedCategory ? ' selected' : ''}>${v} ${k.charAt(0).toUpperCase() + k.slice(1)}</option>`;
        });
        html += '</select>';
        html += '</div>';

        const visibleItems = getVisibleMapItems(trip);
        if (visibleItems.length > 0) {
            html += '<ul class="item-list">';
            visibleItems.forEach(item => {
                const isVisited = item.type === 'activity' && item.data.visited;
                const icon = item.type === 'activity' ? (CATEGORIES[item.data.category] || '📌')
                           : item.type === 'lodging' ? '🏨'
                           : '📍';
                const statusBadge = item.type === 'activity'
                    ? (isVisited ? '<span class="badge badge-ready">Visited</span>' : '')
                    : '';
                const timeStr = item.data.time ? formatTime(item.data.time) : '';
                const clickAction = item.type === 'activity'
                    ? `openActivityModal('${esc(item.data.id)}')`
                    : item.type === 'lodging'
                    ? `openLodgingModal('${esc(item.data.id)}')`
                    : '';

                html += `<li class="item-row${isVisited ? ' visited' : ''}" style="cursor:pointer" onclick="${clickAction}">`;
                html += `<span class="category-icon">${icon}</span>`;
                html += '<div class="item-body">';
                html += `<div class="item-title">${esc(item.data.name || 'Unnamed')}</div>`;
                html += '<div class="item-meta">';
                if (timeStr) html += `<span>${timeStr}</span>`;
                if (item.data.address) html += `<span>${esc(item.data.address)}</span>`;
                html += '</div></div>';
                if (statusBadge) html += statusBadge;
                html += '</li>';
            });
            html += '</ul>';
        } else {
            html += '<div class="empty-state"><p>No places with coordinates to show on the map.</p></div>';
        }

        html += '</div>';
        mc.innerHTML = html;

        initMap();
        updateMapMarkers();
        updateMapRoutes();
    }

    function getVisibleMapItems(trip) {
        const items = [];
        const legId = state.mapFilter.legId;
        const dayPlanId = state.mapFilter.dayPlanId;
        const dayDate = state.mapFilter.dayDate;
        const category = state.mapFilter.category;

        // Day plan filter: show only activities in that plan
        if (dayPlanId) {
            const dp = (trip.dayPlans || []).find(d => d.id === dayPlanId);
            if (dp) {
                (dp.activityIds || []).forEach(actId => {
                    const act = (trip.activities || []).find(a => a.id === actId);
                    if (act && act.coordinates && act.coordinates.lat != null && act.coordinates.lng != null) {
                        if (!category || act.category === category) {
                            items.push({ type: 'activity', data: act });
                        }
                    }
                });
            }
            return items;
        }

        // Day (date) filter: show activities/transport/lodging for that date
        if (dayDate) {
            const events = getEventsForDate(trip, dayDate);
            events.activities.forEach(a => {
                if (a.coordinates && a.coordinates.lat != null && a.coordinates.lng != null) {
                    if (!category || a.category === category) {
                        items.push({ type: 'activity', data: a });
                    }
                }
            });
            events.lodging.forEach(l => {
                if (l.coordinates && l.coordinates.lat != null && l.coordinates.lng != null) {
                    items.push({ type: 'lodging', data: l });
                }
            });
            const leg = getLegForDate(trip, dayDate);
            if (leg && leg.coordinates && leg.coordinates.lat != null && leg.coordinates.lng != null) {
                items.push({ type: 'leg', data: leg });
            }
            return items;
        }

        (trip.lodging || []).forEach(l => {
            if (l.coordinates && l.coordinates.lat != null && l.coordinates.lng != null) {
                if (!legId || l.legId === legId) {
                    items.push({ type: 'lodging', data: l });
                }
            }
        });

        (trip.activities || []).forEach(a => {
            if (a.coordinates && a.coordinates.lat != null && a.coordinates.lng != null) {
                if (!legId || a.legId === legId) {
                    if (!category || a.category === category) {
                        items.push({ type: 'activity', data: a });
                    }
                }
            }
        });

        (trip.legs || []).forEach(l => {
            if (l.coordinates && l.coordinates.lat != null && l.coordinates.lng != null) {
                if (!legId || l.id === legId) {
                    items.push({ type: 'leg', data: l });
                }
            }
        });

        return items;
    }

    function initMap() {
        const container = document.getElementById('mapContainer');
        if (!container) {
            setTimeout(initMap, 100);
            return;
        }

        if (map) {
            if (map.getContainer() === container) {
                map.invalidateSize();
                return;
            }
            try { map.remove(); } catch (e) { /* already detached */ }
            map = null;
        }

        map = L.map('mapContainer', {
            center: [20, 0],
            zoom: settings.mapDefaultZoom || 2
        });

        _rasterTileLayer = L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
            attribution: '&copy; OpenStreetMap contributors',
            maxZoom: 19
        });
        _rasterTileLayer.addTo(map);

        map.on('zoomend moveend', resolveMarkerOverlaps);

        setTimeout(() => {
            if (map) map.invalidateSize();
        }, 200);
    }

    // --- Offline Maps (Android app only) ---

    // Offline vector tile layer reference (inactive — see vector-debug.md for status)
    let _rasterTileLayer = null;
    let _offlineVectorLayer = null;
    let _offlineRegionLayers = [];
    let _offlineLayerEnabled = false;

    /** Rebuild per-region protomaps-leaflet layers from downloaded regions. */
    function _refreshOfflineRegionLayers(theme) {
        if (!map || typeof protomapsL === 'undefined' || typeof AndroidNative === 'undefined') return;
        if (!theme) theme = document.documentElement.getAttribute('data-theme') === 'dark' ? 'dark' : 'light';
        // Remove existing region layers
        _offlineRegionLayers.forEach(layer => {
            if (map.hasLayer(layer)) map.removeLayer(layer);
        });
        _offlineRegionLayers = [];

        // Get completed downloads and create a layer for each
        const regions = JSON.parse(AndroidNative.getRegions() || '[]');
        regions.filter(r => r.status === 'complete').forEach(r => {
            try {
                const filename = r.id + '.pmtiles';
                const nativeZoom = r.maxZoom || 14;
                const layer = protomapsL.leafletLayer({
                    url: 'https://bellevue.tech/tools/trip-planner/offline-pmtiles/' + filename,
                    maxDataZoom: nativeZoom,
                    maxNativeZoom: nativeZoom,
                    maxZoom: 19,
                    flavor: theme
                });
                // Transparent background so tiles outside this file's bbox
                // don't cover the world basemap with solid gray
                layer.backgroundColor = null;
                _offlineRegionLayers.push(layer);
                if (_offlineLayerEnabled) layer.addTo(map);
            } catch (e) {
                console.warn('Failed to add layer for ' + r.id, e);
            }
        });
    }

    // Track download progress: { regionId: { downloaded, total } }
    let _offlineDownloadProgress = {};
    // Cached repo configs: { repoSlug: configJson }
    let _repoConfigs = {};
    // Cached release asset filenames: { repoSlug: Set of filenames }
    let _repoAssets = {};

    function openOfflineMapsModal() {
        if (!window.__ANDROID_APP__) return;

        openModal(`
            <div class="modal-header">
                <h3>Offline Maps</h3>
                <button class="btn-icon" onclick="closeModal()">\u2715</button>
            </div>
            <div class="modal-body">
                <div class="segmented" style="margin-bottom:16px" id="offlineTabBar">
                    <button class="segmented-btn active" data-tab="browse" onclick="_switchOfflineTab('browse',this)">Browse</button>
                    <button class="segmented-btn" data-tab="manage" onclick="_switchOfflineTab('manage',this)">Manage</button>
                    <button class="segmented-btn" data-tab="sources" onclick="_switchOfflineTab('sources',this)">Sources</button>
                </div>
                <div id="offlineTabContent"><div class="empty-state"><p>Loading...</p></div></div>
            </div>
        `);
        _loadAndRenderBrowseTab();
    }

    function _switchOfflineTab(tab, btn) {
        const bar = document.getElementById('offlineTabBar');
        if (bar) bar.querySelectorAll('.segmented-btn').forEach(b => b.classList.remove('active'));
        if (btn) btn.classList.add('active');
        if (tab === 'browse') _loadAndRenderBrowseTab();
        else if (tab === 'manage') _renderManageTab();
        else if (tab === 'sources') _renderSourcesTab();
    }

    // --- Browse tab: show country/region/city hierarchy from repo configs ---

    function _loadAndRenderBrowseTab() {
        const repos = JSON.parse(AndroidNative.getMapRepos() || '[]');
        const downloaded = JSON.parse(AndroidNative.getRegions() || '[]');
        const dlMap = {};
        downloaded.forEach(r => { dlMap[r.id] = r; });

        if (repos.length === 0) {
            const c = document.getElementById('offlineTabContent');
            if (c) c.innerHTML = `<div class="empty-state"><p>No map sources configured.</p><p style="font-size:13px;color:var(--text-muted)">Go to Sources tab to add a map repository.</p></div>`;
            return;
        }

        // Load configs: use in-memory cache → persistent cache → network fetch
        const results = {};
        repos.forEach(repo => {
            // 1. In-memory cache (from this session)
            if (_repoConfigs[repo]) {
                results[repo] = _repoConfigs[repo];
                return;
            }
            // 2. Persistent cache (survives app restart, works offline)
            const cached = AndroidNative.getCachedRepoConfig(repo);
            if (cached) {
                try {
                    const config = JSON.parse(cached);
                    if (!config.error) {
                        _repoConfigs[repo] = config;
                        results[repo] = config;
                    }
                } catch (e) {}
            }
            // 3. Network fetch (also updates cache)
            if (!results[repo]) {
                const configJson = AndroidNative.fetchRepoConfig(repo);
                try {
                    const config = JSON.parse(configJson);
                    if (!config.error) {
                        _repoConfigs[repo] = config;
                        results[repo] = config;
                    }
                } catch (e) {}
            }
        });

        // Load release assets per repo (same 3-tier caching pattern)
        repos.forEach(repo => {
            if (_repoAssets[repo]) return;
            const cached = AndroidNative.getCachedReleaseAssets(repo);
            if (cached) {
                try { _repoAssets[repo] = new Set(JSON.parse(cached)); return; } catch (e) {}
            }
            try {
                const json = AndroidNative.fetchReleaseAssets(repo);
                _repoAssets[repo] = new Set(JSON.parse(json));
            } catch (e) {
                _repoAssets[repo] = new Set();
            }
        });

        _renderBrowseContent(results, dlMap);
    }

    function _renderBrowseContent(configs, dlMap) {
        const c = document.getElementById('offlineTabContent');
        if (!c) return;
        let html = '';

        Object.entries(configs).forEach(([repo, config]) => {
            const maxZoom = config.maxZoom || 14;
            const countries = config.countries || {};
            Object.entries(countries).forEach(([ckey, country]) => {
                const regions = country.regions || {};
                const hasRegions = Object.keys(regions).length > 0;
                html += `<div style="border:1px solid var(--border);border-radius:var(--radius-sm);margin-bottom:10px">`;

                // Country header — cascading download: downloads all regions (or country file if no regions)
                html += `<div style="padding:12px;display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="_toggleOfflineSection('sec-${ckey}')">`;
                html += `<strong>${esc(country.name)}</strong>`;
                if (hasRegions) {
                    html += _cascadeButton(ckey, regions, dlMap, repo, maxZoom, 'region');
                } else {
                    html += _dlButton(ckey, country.name, ckey, repo, country.file, country.bbox, maxZoom, dlMap[ckey], dlMap);
                }
                html += `</div>`;

                // Expandable regions
                html += `<div id="sec-${ckey}" style="display:none">`;
                Object.entries(regions).forEach(([rkey, region]) => {
                    const rid = ckey + '--' + rkey;
                    const cities = region.cities || {};
                    const hasCities = Object.keys(cities).length > 0;
                    html += `<div style="padding:8px 12px 8px 24px;border-top:1px solid var(--border-light)">`;
                    html += `<div style="display:flex;justify-content:space-between;align-items:center;cursor:pointer" onclick="_toggleOfflineSection('sec-${rid}')">`;
                    html += `<span>${esc(region.name)}</span>`;
                    // Region — cascading download: downloads all cities (or region file if no cities)
                    if (hasCities) {
                        html += _cascadeButton(rid, cities, dlMap, repo, maxZoom, 'city', ckey, rkey);
                    } else {
                        html += _dlButton(rid, region.name, ckey, repo, region.file, region.bbox, maxZoom, dlMap[rid], dlMap);
                    }
                    html += `</div>`;

                    // Cities
                    html += `<div id="sec-${rid}" style="display:none">`;
                    Object.entries(cities).forEach(([citykey, city]) => {
                        const cityid = ckey + '--' + rkey + '--' + citykey;
                        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0 6px 16px;border-top:1px solid var(--border-light)">`;
                        html += `<span style="font-size:13px">${esc(city.name)}</span>`;
                        html += _dlButton(cityid, city.name, ckey, repo, city.file, city.bbox, maxZoom, dlMap[cityid], dlMap);
                        html += `</div>`;
                    });
                    html += `</div>`;

                    html += `</div>`;
                });
                html += `</div>`;

                html += `</div>`;
            });
        });

        if (!html) {
            html = `<div class="empty-state"><p>No maps available from configured sources.</p></div>`;
        }

        c.innerHTML = html;
    }

    function _dlButton(id, name, country, repo, file, bbox, maxZoom, existing, dlMap) {
        const progress = _offlineDownloadProgress[id];
        if (existing && existing.status === 'complete') {
            return `<span style="color:var(--success);font-weight:600;font-size:13px">Downloaded &#10003;</span>`;
        }
        // Check if covered by a downloaded parent
        if (dlMap) {
            const parent = _findCoveringParent(id, dlMap);
            if (parent) {
                return `<span style="color:var(--success);font-size:12px">Covered by ${esc(parent.name)}</span>`;
            }
        }
        if ((existing && existing.status === 'downloading') || progress) {
            const p = progress || { downloaded: existing ? existing.downloadedBytes : 0, total: existing ? existing.sizeBytes : 0 };
            const pct = p.total > 0 ? Math.round(p.downloaded / p.total * 100) : 0;
            return `<div style="display:flex;flex-direction:column;align-items:flex-end;min-width:120px">
                <div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden">
                    <div id="progress-${id}" style="width:${pct}%;height:100%;background:var(--primary);transition:width 0.3s"></div>
                </div>
                <span id="progress-lbl-${id}" style="color:var(--text-muted);font-size:11px;margin-top:2px">${_formatBytes(p.downloaded)} / ${_formatBytes(p.total)}</span>
            </div>`;
        }
        if (existing && existing.status === 'failed') {
            return `<button class="btn btn-sm" onclick="event.stopPropagation();_retryDownload('${esc(id)}','${esc(name)}','${esc(country)}','${esc(repo)}','${esc(file)}',${bbox.join(',')},${maxZoom})">Retry</button>`;
        }
        if (!file) return '';
        return `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();_startDownload('${esc(id)}','${esc(name)}','${esc(country)}','${esc(repo)}','${esc(file)}',${bbox.join(',')},${maxZoom})">Download</button>`;
    }

    /**
     * Determine download strategy for a parent node.
     * Returns { type: 'children', items: [...available entries] }
     *      or { type: 'parent', file: parentFile, name: parentName }
     */
    function _resolveCascadeStrategy(parentId, repo, config) {
        const assets = _repoAssets[repo] || new Set();
        const hasAssetInfo = assets.size > 0;
        const countries = config.countries || {};
        const parts = parentId.split('--');

        if (parts.length === 1) {
            // Country level → children are regions
            const country = countries[parts[0]];
            if (!country || !country.regions) return null;
            const regions = country.regions;
            const entries = Object.entries(regions);
            // If no asset info, assume all children with files are available
            const available = hasAssetInfo
                ? entries.filter(([, r]) => r.file && assets.has(r.file))
                : entries.filter(([, r]) => r.file);
            if (available.length === entries.length || !hasAssetInfo) {
                return { type: 'children', items: available.map(([k, r]) => ({ key: k, ...r })) };
            }
            // Not all children available — try parent file
            if (country.file && assets.has(country.file)) {
                return { type: 'parent', file: country.file, name: country.name, bbox: country.bbox, id: parts[0] };
            }
            // Fall back to whatever children are available
            if (available.length > 0) {
                return { type: 'children', items: available.map(([k, r]) => ({ key: k, ...r })) };
            }
            return null;
        } else if (parts.length === 2) {
            // Region level → children are cities
            const country = countries[parts[0]];
            if (!country || !country.regions) return null;
            const region = country.regions[parts[1]];
            if (!region || !region.cities) return null;
            const cities = region.cities;
            const entries = Object.entries(cities);
            const available = hasAssetInfo
                ? entries.filter(([, c]) => c.file && assets.has(c.file))
                : entries.filter(([, c]) => c.file);
            if (available.length === entries.length || !hasAssetInfo) {
                return { type: 'children', items: available.map(([k, c]) => ({ key: k, ...c })) };
            }
            // Not all children available — try parent (region) file
            if (region.file && assets.has(region.file)) {
                return { type: 'parent', file: region.file, name: region.name, bbox: region.bbox, id: parentId };
            }
            if (available.length > 0) {
                return { type: 'children', items: available.map(([k, c]) => ({ key: k, ...c })) };
            }
            return null;
        }
        return null;
    }

    /**
     * Check if a child region/city is covered by a downloaded parent file.
     * Returns the parent region object { id, name } or null.
     */
    function _findCoveringParent(childId, dlMap) {
        const parts = childId.split('--');
        // Check if parent region covers this city
        if (parts.length === 3) {
            const regionId = parts[0] + '--' + parts[1];
            const dl = dlMap[regionId];
            if (dl && dl.status === 'complete') return { id: regionId, name: dl.name };
        }
        // Check if country covers this region or city
        if (parts.length >= 2) {
            const countryId = parts[0];
            const dl = dlMap[countryId];
            if (dl && dl.status === 'complete') return { id: countryId, name: dl.name };
        }
        return null;
    }

    /** Cascade button for country (downloads all regions) or region (downloads all cities). */
    function _cascadeButton(parentId, children, dlMap, repo, maxZoom, level, ckey, rkey) {
        // Check if the parent itself is downloaded (covers all children)
        const parentDl = dlMap[parentId];
        if (parentDl && parentDl.status === 'complete') {
            return `<span style="color:var(--success);font-weight:600;font-size:13px">Downloaded &#10003;</span>`;
        }

        const childEntries = Object.entries(children);
        const total = childEntries.length;
        let complete = 0, downloading = 0;
        childEntries.forEach(([key, child]) => {
            const childId = level === 'region' ? parentId + '--' + key :
                            (ckey + '--' + rkey + '--' + key);
            const dl = dlMap[childId];
            if (dl && dl.status === 'complete') complete++;
            else if (dl && dl.status === 'downloading') downloading++;
        });

        if (complete === total) {
            return `<span style="color:var(--success);font-weight:600;font-size:13px">All ${total} downloaded &#10003;</span>`;
        }
        if (downloading > 0 || complete > 0) {
            const inProgress = downloading > 0;
            return `<span style="color:var(--text-muted);font-size:13px">${complete}/${total} downloaded${inProgress ? '...' : ''}</span>`;
        }

        // Use cascade strategy to determine label
        const config = _repoConfigs[repo];
        const strategy = config ? _resolveCascadeStrategy(parentId, repo, config) : null;

        if (strategy && strategy.type === 'parent') {
            return `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();_cascadeDownload('${esc(parentId)}','${esc(repo)}',${maxZoom})">Download ${esc(strategy.name)} file</button>`;
        }

        const count = strategy && strategy.type === 'children' ? strategy.items.length : total;
        return `<button class="btn btn-sm btn-primary" onclick="event.stopPropagation();_cascadeDownload('${esc(parentId)}','${esc(repo)}',${maxZoom})">Download All (${count})</button>`;
    }

    /** Download all children of a country or region that aren't already downloaded. Uses cascade strategy. */
    function _cascadeDownload(parentId, repo, maxZoom) {
        const config = _repoConfigs[repo];
        if (!config) return;

        const strategy = _resolveCascadeStrategy(parentId, repo, config);
        if (!strategy) return;

        const countries = config.countries || {};
        const downloaded = JSON.parse(AndroidNative.getRegions() || '[]');
        const dlSet = new Set(downloaded.filter(r => r.status === 'complete' || r.status === 'downloading').map(r => r.id));
        const parts = parentId.split('--');

        if (strategy.type === 'parent') {
            // Download the single parent file
            if (!dlSet.has(strategy.id)) {
                _startDownload(strategy.id, strategy.name, parts[0], repo, strategy.file, strategy.bbox[0], strategy.bbox[1], strategy.bbox[2], strategy.bbox[3], maxZoom);
            }
        } else {
            // Download each available child
            strategy.items.forEach(item => {
                let childId;
                if (parts.length === 1) {
                    childId = parts[0] + '--' + item.key;
                } else {
                    childId = parts[0] + '--' + parts[1] + '--' + item.key;
                }
                if (!dlSet.has(childId)) {
                    _startDownload(childId, item.name, parts[0], repo, item.file, item.bbox[0], item.bbox[1], item.bbox[2], item.bbox[3], maxZoom);
                }
            });
        }
    }

    function _startDownload(id, name, country, repo, file, w, s, e, n, maxZoom) {
        AndroidNative.downloadRegion(id, name, country, repo, file, w, s, e, n, maxZoom, 0);
        _offlineDownloadProgress[id] = { downloaded: 0, total: 0 };
        // Immediately replace the button with a progress bar (avoids full re-render flicker)
        const btn = typeof event !== 'undefined' && event && event.target ? event.target.closest('button') : null;
        if (btn) {
            const wrapper = document.createElement('div');
            wrapper.style.cssText = 'display:flex;flex-direction:column;align-items:flex-end;min-width:120px';
            wrapper.innerHTML = `<div style="width:100%;height:4px;background:var(--border);border-radius:2px;overflow:hidden"><div id="progress-${id}" style="width:0%;height:100%;background:var(--primary);transition:width 0.3s"></div></div><span id="progress-lbl-${id}" style="color:var(--text-muted);font-size:11px;margin-top:2px">Starting...</span>`;
            btn.replaceWith(wrapper);

            _loadAndRenderBrowseTab();

    }

    function _retryDownload(id, name, country, repo, file, w, s, e, n, maxZoom) {

    function _renderManageTab() {
        const c = document.getElementById('offlineTabContent');
        if (!c) return;
        const regions = JSON.parse(AndroidNative.getRegions() || '[]');
        const storageInfo = JSON.parse(AndroidNative.getStorageInfo() || '{}');

        let html = `<div style="font-size:13px;color:var(--text-muted);margin-bottom:16px">`;
        html += `Used: <strong>${_formatBytes(storageInfo.usedBytes || 0)}</strong>`;
        html += ` / Available: <strong>${_formatBytes(storageInfo.availableBytes || 0)}</strong>`;
        html += `</div>`;

        const byCountry = {};
        regions.forEach(r => {
            if (!byCountry[r.country]) byCountry[r.country] = [];
            byCountry[r.country].push(r);
        });

        if (Object.keys(byCountry).length === 0) {
            html += `<div class="empty-state"><p>No offline maps downloaded yet.</p></div>`;
        }

        Object.entries(byCountry).sort((a, b) => a[0].localeCompare(b[0])).forEach(([country, countryRegions]) => {
            const countryBytes = countryRegions.reduce((sum, r) => sum + (r.sizeBytes || 0), 0);

            html += `<button class="btn btn-sm btn-danger" onclick="_deleteCountryMaps('${esc(country)}')">Delete All</button>`;
            html += `</div>`;

    // Progress callback from Android
    window.__onDownloadProgress = function(regionId, downloaded, total) {
        _offlineDownloadProgress[regionId] = { downloaded, total };
        // Update progress bar if visible
        const bar = document.getElementById('progress-' + regionId);
        if (bar && total > 0) {
            bar.style.width = Math.round(downloaded / total * 100) + '%';
        }
        const lbl = document.getElementById('progress-lbl-' + regionId);
        if (lbl) lbl.textContent = _formatBytes(downloaded) + ' / ' + _formatBytes(total);
    };

    // Completion callback from Android
    window.__onDownloadComplete = function(regionId, success, errorMsg) {
        delete _offlineDownloadProgress[regionId];
        if (success) {
            toast('Downloaded ' + regionId.split('--').pop());
        } else {
            toast(errorMsg ? 'Download failed: ' + errorMsg : 'Download failed.');
        }
        // Refresh whichever tab is open
        const content = document.getElementById('offlineTabContent');
        if (content) {
            const activeTab = document.querySelector('#offlineTabBar .segmented-btn.active');
            const tab = activeTab ? activeTab.dataset.tab : 'browse';
            if (tab === 'browse') _loadAndRenderBrowseTab();
            else if (tab === 'manage') _renderManageTab();
        }
        // Refresh map layers to include newly downloaded region
        if (success) _refreshOfflineRegionLayers();
    };

    function _formatBytes(bytes) {
        if (bytes == null || bytes === 0) return '0 B';
        const units = ['B', 'KB', 'MB', 'GB'];
        let i = 0;
        let val = bytes;
        while (val >= 1024 && i < units.length - 1) { val /= 1024; i++; }
        return val.toFixed(i > 0 ? 1 : 0) + ' ' + units[i];
    }

    function resolveMarkerOverlaps() {
        if (!map || !mapMarkers) return;
        const markers = [];
        mapMarkers.eachLayer(layer => {
            if (layer instanceof L.Marker && layer.options.icon) markers.push(layer);
        });
        if (markers.length < 2) return;

        const rects = markers.map(m => {
            const pt = map.latLngToContainerPoint(m.getLatLng());
            const size = m.options.icon.options.iconSize || [24, 24];
            const anchor = m.options.icon.options.iconAnchor || [size[0]/2, size[1]/2];
            return {
                marker: m,
                x: pt.x - anchor[0],
                y: pt.y - anchor[1],
                w: size[0],
                h: size[1],
                anchorX: anchor[0],
                anchorY: anchor[1]
            };
        });

        for (let pass = 0; pass < 3; pass++) {
            let moved = false;
            for (let i = 0; i < rects.length; i++) {
                for (let j = i + 1; j < rects.length; j++) {
                    const a = rects[i], b = rects[j];
                    const overlapX = Math.min(a.x + a.w, b.x + b.w) - Math.max(a.x, b.x);
                    const overlapY = Math.min(a.y + a.h, b.y + b.h) - Math.max(a.y, b.y);
                    if (overlapX > 0 && overlapY > 0) {
                        const shift = Math.min(overlapX, overlapY) / 2 + 2;
                        if (overlapX < overlapY) {
                            const dir = (a.x + a.w/2) < (b.x + b.w/2) ? -1 : 1;
                            a.x += dir * shift; b.x -= dir * shift;
                        } else {
                            const dir = (a.y + a.h/2) < (b.y + b.h/2) ? -1 : 1;
                            a.y += dir * shift; b.y -= dir * shift;
                        }
                        moved = true;
                    }
                }
            }
            if (!moved) break;
        }

        rects.forEach(r => {
            const pt = map.latLngToContainerPoint(r.marker.getLatLng());
            const origOpts = r.marker.options.icon.options;
            const origAnchor = origOpts.iconAnchor || [origOpts.iconSize[0]/2, origOpts.iconSize[1]/2];
            const newAnchorX = pt.x - r.x;
            const newAnchorY = pt.y - r.y;
            if (Math.abs(newAnchorX - origAnchor[0]) > 1 || Math.abs(newAnchorY - origAnchor[1]) > 1) {
                const newIcon = L.divIcon({
                    ...origOpts,
                    iconAnchor: [newAnchorX, newAnchorY]
                });
                r.marker.setIcon(newIcon);
            }
        });
    }
