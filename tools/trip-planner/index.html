    const SHARE_LINK_MAX_URL = 8000; // Max URL length for reliable sharing

    async function shareTripLink(tripId) {
        const trip = getTrip(tripId);
        if (!trip) { toast('No trip to share'); return; }
        const payload = { version: 1, format: 'trip-planner-single', trip };
        try {
            const encoded = encodeShareData(payload);
            const url = window.location.origin + window.location.pathname + '#trip=' + encoded;
            if (url.length > SHARE_LINK_MAX_URL) {
                toast('Trip too large for link (' + (url.length/1024).toFixed(0) + 'KB) — use Share Trip File instead');
                return;
            }
            // Verify roundtrip
            const json = decodeShareData(encoded);
            const rt = JSON.parse(json);
            if (!rt.trip || rt.trip.name !== trip.name) {
                toast('Roundtrip verification failed');
                return;
            }
            try {
                await navigator.clipboard.writeText(url);
                toast('Share link copied! (' + url.length + ' chars)');
            } catch {
                prompt('Copy this share link:', url);
            }
        } catch (err) {
            toast('Failed: ' + err.message);
        }
    }

    function canShareAsLink(tripId) {
        try {
            const trip = getTrip(tripId);
            if (!trip) return false;
            const payload = { version: 1, format: 'trip-planner-single', trip };
            const encoded = encodeShareData(payload);
            return (encoded.length + 60) <= SHARE_LINK_MAX_URL;
        } catch { return false; }
    }

    function saveLeg() {
        const trip = getTrip();
        if (!trip) return;
        const city = document.getElementById('legCity').value.trim();
        if (!city) { toast('City name is required'); return; }
        const country = document.getElementById('legCountry').value.trim();
        const startDate = document.getElementById('legStart').value;
        const endDate = document.getElementById('legEnd').value;
        const notes = document.getElementById('legNotes').value.trim();
        const legType = document.getElementById('legType').value || 'default';
        const hostAddress = document.getElementById('legHostAddress')?.value?.trim() || '';
        if (state.editingId) {
            const leg = trip.legs.find(l => l.id === state.editingId);
            if (leg) {
                leg.city = city; leg.country = country; leg.startDate = startDate; leg.endDate = endDate; leg.notes = notes;
                leg.legType = legType; leg.hostAddress = hostAddress;
                if (lastCityResult) leg.coordinates = { lat: lastCityResult.lat, lng: lastCityResult.lng };
            }
        } else {
            const maxOrder = trip.legs.reduce((m, l) => Math.max(m, l.order || 0), 0);
            trip.legs.push({ id: uid(), city, country, startDate, endDate, coordinates: lastCityResult ? { lat: lastCityResult.lat, lng: lastCityResult.lng } : null, order: maxOrder + 1, notes, legType, hostAddress });
        }
        const legDates = trip.legs.filter(l => l.startDate).map(l => l.startDate).sort();
        const legEndDates = trip.legs.filter(l => l.endDate).map(l => l.endDate).sort();
        if (legDates.length > 0) trip.startDate = legDates[0];
        if (legEndDates.length > 0) trip.endDate = legEndDates[legEndDates.length - 1];
        trip.updatedAt = new Date().toISOString();
        save(); closeModal(); render();
        toast(state.editingId ? 'City updated' : 'City added');
    }

    async function deleteLeg(legId) {
        const ok = await showConfirm('Delete City Stop', 'This will remove this city and all its lodging, activities, and day plans.');
        if (!ok) return;
        const trip = getTrip();
        if (!trip) return;
        trip.legs = trip.legs.filter(l => l.id !== legId);
        trip.lodging = trip.lodging.filter(l => l.legId !== legId);
        trip.activities = trip.activities.filter(a => a.legId !== legId);
        trip.dayPlans = trip.dayPlans.filter(dp => dp.legId !== legId);
        trip.optionGroups = (trip.optionGroups || []).filter(og => og.legId !== legId);
        trip.transport = trip.transport.filter(t => t.fromLegId !== legId && t.toLegId !== legId);
        const legDates = trip.legs.filter(l => l.startDate).map(l => l.startDate).sort();
        const legEndDates = trip.legs.filter(l => l.endDate).map(l => l.endDate).sort();
        trip.startDate = legDates.length > 0 ? legDates[0] : '';
        trip.endDate = legEndDates.length > 0 ? legEndDates[legEndDates.length - 1] : '';
        trip.updatedAt = new Date().toISOString();
        save(); closeModal(); render(); toast('City removed');
    }

    function reorderLegs(tripId, legId, direction) {
        const trip = getTrip(tripId);
        if (!trip) return;
        const sorted = trip.legs.slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        const idx = sorted.findIndex(l => l.id === legId);
        if (idx < 0) return;
        const swapIdx = idx + direction;
        if (swapIdx < 0 || swapIdx >= sorted.length) return;
        const tmpOrder = sorted[idx].order;
        sorted[idx].order = sorted[swapIdx].order;
        sorted[swapIdx].order = tmpOrder;
        if (!trip._transportNeedsReview) trip._transportNeedsReview = true;
        save(); render(); openLegModal(legId);
    }

    function reverseAllLegs() {
        const trip = getTrip(); if (!trip) return;
        const legs = (trip.legs || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        if (legs.length < 2) { toast('Need at least 2 legs to reverse'); return; }
        const orders = legs.map(l => l.order);
        for (let i = 0; i < legs.length; i++) {
            legs[i].order = orders[legs.length - 1 - i];
        }
        for (const t of trip.transport || []) {
            const tmpFromLegId = t.fromLegId; const tmpFromCity = t.fromCity;
            t.fromLegId = t.toLegId; t.fromCity = t.toCity;
            t.toLegId = tmpFromLegId; t.toCity = tmpFromCity;
        }
        const tmpStart = trip.startLocation;
        trip.startLocation = trip.endLocation;
        trip.endLocation = tmpStart;
        const tmpStartCoords = trip.startLocationCoords;
        trip.startLocationCoords = trip.endLocationCoords;
        trip.endLocationCoords = tmpStartCoords;
        trip._transportNeedsReview = true;
        save(); render(); toast('Legs reversed — review transport plans');
    }

    function dismissTransportReview() {
        const trip = getTrip(); if (!trip) return;
        delete trip._transportNeedsReview;
        save(); render(); toast('Transport review dismissed');
    }

    function computeBudget(trip) {
        const result = { total: 0, byCategory: { lodging: 0, transport: 0, activities: 0 }, byCurrency: {} };
        if (!trip) return result;
        function addCost(amount, currency, category) {
            const num = parseFloat(amount); if (isNaN(num) || num === 0) return;
            result.byCategory[category] = (result.byCategory[category] || 0) + num;
            result.total += num;
            const cur = currency || trip.currency || settings.defaultCurrency;
            result.byCurrency[cur] = (result.byCurrency[cur] || 0) + num;
        }
        for (const l of trip.lodging || []) addCost(l.cost, l.currency, 'lodging');
        for (const t of trip.transport || []) addCost(t.cost, t.currency, 'transport');
        for (const a of trip.activities || []) addCost(a.cost, a.currency, 'activities');
        return result;
    }

    function computeProgress(trip) {
        const result = { bookedLodging: 0, totalLodging: 0, bookedTransport: 0, totalTransport: 0, bookedActivities: 0, totalReservations: 0 };
        if (!trip) return result;
        result.totalLodging = (trip.lodging || []).length;
        result.bookedLodging = (trip.lodging || []).filter(l => l.booked).length;
        result.totalTransport = (trip.transport || []).length;
        result.bookedTransport = (trip.transport || []).filter(t => t.booked).length;
        const reservable = (trip.activities || []).filter(a => a.reservationNeeded);
        result.totalReservations = reservable.length;
        result.bookedActivities = reservable.filter(a => a.booked).length;
        return result;
    }

    function computeActionItems(trip) {
        const items = [];
        if (!trip) return items;
        const legs = (trip.legs || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        if (legs.length === 0) { items.push({ text:'Add cities to your trip', type:'leg', action:'openLegModal()', priority:0 }); return items; }
        for (const leg of legs) {
            const lt2 = leg.legType || 'default';
            if (lt2 !== 'home' && lt2 !== 'stayingWithFriend') {
                const ll = (trip.lodging || []).filter(l => l.legId === leg.id);
                const _hoOpts = (trip.hotelOptions || []).filter(ho => ho.city === leg.city);
                const hoCount = _hoOpts.length;
                const optSuffix = hoCount > 0 ? ` (${hoCount} option${hoCount !== 1 ? 's' : ''})` : '';
                if (ll.length === 0) items.push({ text:`Add lodging for ${leg.city}${optSuffix}`, type:'lodging', action:`openLodgingModalForDate('${leg.startDate || ''}','${leg.id}','${leg.endDate || ''}')`, priority:1, hotelOptions: _hoOpts, legId: leg.id, startDate: leg.startDate || '', endDate: leg.endDate || '' });
                else if (!ll.some(l => l.booked)) items.push({ text:`Book lodging for ${leg.city}${optSuffix}`, type:'lodging', action:`openLodgingModalForDate('${leg.startDate || ''}','${leg.id}','${leg.endDate || ''}')`, priority:1, hotelOptions: _hoOpts, legId: leg.id, startDate: leg.startDate || '', endDate: leg.endDate || '' });
            }
        }
        // Transport to first leg (from home/origin)
        if (legs.length > 0) {
            const firstLeg = legs[0];
            const lt0 = (trip.transport || []).filter(t => t.toLegId === firstLeg.id && (!t.fromLegId || !legs.some(l => l.id === t.fromLegId)));
            if (lt0.length === 0) items.push({ text:`Add transport to ${firstLeg.city}`, type:'transport', action:`openTransportModalByLeg('','${firstLeg.id}','${firstLeg.startDate || ''}')`, priority:2 });
            else if (!lt0.some(t => t.booked)) { const _t0 = lt0[0]; const _c0 = _t0.carrier || ''; const _n0 = (_t0.notes || '').trim(); items.push({ text:`Book ${_c0 ? _c0 + ' ' : ''}transport to ${firstLeg.city}`, type:'transport', action:`openTransportModal('${_t0.id}')`, priority:2, subtitle: _n0 ? (_n0.length > 120 ? _n0.slice(0, 120) + '...' : _n0) : '' }); }
        }
        for (let i = 1; i < legs.length; i++) {
            const lt = (trip.transport || []).filter(t => t.toLegId === legs[i].id || t.fromLegId === legs[i-1].id);
            if (lt.length === 0) items.push({ text:`Add transport to ${legs[i].city}`, type:'transport', action:`openTransportModalByLeg('${legs[i-1].id}','${legs[i].id}','${legs[i].startDate || ''}')`, priority:2 });
            else if (!lt.some(t => t.booked)) { const _ti = lt[0]; const _ci = _ti.carrier || ''; const _ni = (_ti.notes || '').trim(); items.push({ text:`Book ${_ci ? _ci + ' ' : ''}transport to ${legs[i].city}`, type:'transport', action:`openTransportModal('${_ti.id}')`, priority:2, subtitle: _ni ? (_ni.length > 120 ? _ni.slice(0, 120) + '...' : _ni) : '' }); }
        }
        // Transport from last leg (back home/onward)
        if (legs.length > 0) {
            const lastLeg = legs[legs.length - 1];
            const ltN = (trip.transport || []).filter(t => t.fromLegId === lastLeg.id && (!t.toLegId || !legs.some(l => l.id === t.toLegId)));
            if (ltN.length === 0) items.push({ text:`Add transport from ${lastLeg.city}`, type:'transport', action:`openTransportModalByLeg('${lastLeg.id}','','${lastLeg.endDate || ''}')`, priority:2 });
            else if (!ltN.some(t => t.booked)) { const _tN = ltN[0]; const _cN = _tN.carrier || ''; const _nN = (_tN.notes || '').trim(); items.push({ text:`Book ${_cN ? _cN + ' ' : ''}transport from ${lastLeg.city}`, type:'transport', action:`openTransportModal('${_tN.id}')`, priority:2, subtitle: _nN ? (_nN.length > 120 ? _nN.slice(0, 120) + '...' : _nN) : '' }); }
        }
        if (trip._transportNeedsReview) {
            for (const t of trip.transport || []) {
                const label = [t.carrier, t.flightNumber].filter(Boolean).join(' ') || `${t.fromCity || '?'} \u2192 ${t.toCity || '?'}`;
                items.push({ text:`Review transport: ${label} (legs reordered)`, type:'transport', action:`openTransportModal('${t.id}')`, priority:0 });
            }
            items.push({ text:'Dismiss transport review', type:'transport', action:`dismissTransportReview()`, priority:0 });
        }
        for (const act of trip.activities || []) { if (act.reservationNeeded && !act.booked) items.push({ text:`Book ${act.name}`, type:'activity', action:`openActivityModal('${act.id}')`, priority:3 }); }
        for (const leg of legs) { const lt3 = leg.legType || 'default'; if (lt3 !== 'home' && lt3 !== 'chill' && !(trip.activities || []).some(a => a.legId === leg.id)) items.push({ text:`Add activities for ${leg.city}`, type:'activity', action:`openActivityModal(null,'${leg.startDate || ''}','${leg.id}')`, priority:3 }); }
        items.sort((a, b) => a.priority - b.priority);
        return items;
    }

                    inner += `</div>`;
                    inner += `<div style="display:flex;gap:6px;flex-shrink:0">`;
                    if (ho.link) inner += `<a href="${esc(ho.link)}" target="_blank" rel="noopener" class="btn btn-sm" style="font-size:11px;white-space:nowrap" onclick="event.stopPropagation()">Link</a>`;
                    inner += `<button class="btn btn-sm btn-primary" style="font-size:11px;white-space:nowrap" onclick="event.stopPropagation();openQuickBookModal('${esc(ho.id)}','${esc(item.startDate)}')">Book</button>`;
                    inner += `</div>`;
                    inner += `</div>`;
                }
                inner += `<div style="margin-top:6px"><a href="#" style="font-size:12px;color:var(--primary)" onclick="event.preventDefault();event.stopPropagation();openLodgingModalForDate('${esc(item.startDate)}','${esc(item.legId)}','${esc(item.endDate)}')">+ Add lodging manually</a></div>`;
                inner += '</div>';
            }
            return `<div class="item-row" style="cursor:pointer;margin:0 8px 4px;flex-wrap:wrap" onclick="state.expandedLodgingActions.has('${esc(key)}') ? state.expandedLodgingActions.delete('${esc(key)}') : state.expandedLodgingActions.add('${esc(key)}');renderActionItems()"><div class="item-body"><div class="item-title" style="font-size:13px">${esc(item.text)}</div></div><span style="color:var(--text-light);font-size:14px;transition:transform 0.2s;transform:rotate(${isExp ? '90deg' : '0deg'})">\u203A</span>${inner}</div>`;
        }
        return `<div class="item-row" style="cursor:pointer;margin:0 8px 4px" ${item.action ? `onclick="${esc(item.action)}"` : ''}><div class="item-body"><div class="item-title" style="font-size:13px">${esc(item.text)}</div></div>${item.action ? '<span style="color:var(--text-light);font-size:14px">\u203A</span>' : ''}</div>`;
    }

    function renderActionItems() {
        const trip = getTrip();
        const mc = document.getElementById('mainContent');
        if (!trip) { mc.innerHTML = '<div class="view-content"><div class="empty-state"><p>No trip selected</p></div></div>'; return; }
        const legs = (trip.legs || []).slice().sort((a, b) => (a.order || 0) - (b.order || 0));
        const progress = computeProgress(trip);
        const allActions = computeActionItems(trip);
        const phases = [];
        const hasLegs = legs.length > 0;
        phases.push({ title:'Plan Cities', icon:'\u{1F4CD}', done:hasLegs, items:hasLegs ? [] : allActions.filter(a => a.type === 'leg') });
        const lodgingActions = allActions.filter(a => a.type === 'lodging');
        phases.push({ title:'Book Lodging', icon:'\u{1F3E8}', done:hasLegs && progress.totalLodging > 0 && progress.bookedLodging === progress.totalLodging, items:lodgingActions });
        const transportActions = allActions.filter(a => a.type === 'transport');
        phases.push({ title:'Book Transport', icon:'\u2708\uFE0F', done:hasLegs && transportActions.length === 0 && progress.totalTransport > 0 && progress.bookedTransport === progress.totalTransport, items:transportActions });
        const activityActions = allActions.filter(a => a.type === 'activity');
        const hasActs = (trip.activities || []).length > 0;
        phases.push({ title:'Book Activities', icon:'\u{1F3AF}', done:hasLegs && hasActs && (progress.totalReservations === 0 || progress.bookedActivities === progress.totalReservations), items:activityActions });
        if (settings.showPackingList) {
            const tp = (trip.packingList || []).length;
            const pc = (trip.packingList || []).filter(p => p.packed).length;
            phases.push({ title:'Prepare', icon:'\u{1F9F3}', done:tp > 0 && pc === tp, items:tp === 0 ? [{text:'Add items to packing list',type:'packing',action:'',priority:4}] : [] });
        }
        const completedCount = phases.filter(p => p.done).length;
        const overallPct = phases.length > 0 ? Math.round((completedCount / phases.length) * 100) : 0;
        let phasesHTML = phases.map(phase => {
            const check = phase.done ? '<span style="color:var(--success);font-weight:600">\u2713</span>' : '<span style="color:var(--text-light)">\u25CB</span>';
            return `<div class="card" style="margin-bottom:12px"><div class="card-header"><div style="display:flex;align-items:center;gap:8px">${check}<span>${phase.icon}</span><strong>${phase.title}</strong></div>${phase.done ? '<span class="badge badge-ready" style="font-size:10px">Done</span>' : ''}</div>${phase.items.length > 0 ? `<div class="card-body" style="padding:4px 0">${phase.items.map(item => renderActionItem(item)).join('')}</div>` : (phase.done ? '' : '<div class="card-body"><span style="font-size:13px;color:var(--text-muted)">No action items</span></div>')}</div>`;
        }).join('');
        let packingHTML = '';
        if (settings.showPackingList) {
            const packItems = trip.packingList || [];
            const packedCount = packItems.filter(p => p.packed).length;
            packingHTML = `<div class="card" style="margin-top:20px"><div class="card-header"><div style="display:flex;align-items:center;gap:8px"><span>🧳</span><strong>Packing List</strong></div><span style="font-size:12px;color:var(--text-muted)">${packedCount}/${packItems.length} packed</span></div><div class="card-body">`;
            if (packItems.length > 0) {
                const grouped = {};
                packItems.forEach(p => { const c = p.category || 'Other'; if (!grouped[c]) grouped[c] = []; grouped[c].push(p); });
                Object.keys(grouped).sort().forEach(cat => {
                    packingHTML += `<div style="font-size:12px;font-weight:600;color:var(--text-muted);margin:8px 0 4px;text-transform:uppercase">${esc(cat)}</div>`;
                    grouped[cat].forEach(p => {
                        packingHTML += `<div class="item-row" style="margin:0 0 2px"><label style="display:flex;align-items:center;gap:8px;cursor:pointer;flex:1"><input type="checkbox" ${p.packed ? 'checked' : ''} onchange="togglePackingItem('${esc(p.id)}')"><span style="${p.packed ? 'text-decoration:line-through;color:var(--text-muted)' : ''}">${esc(p.item)}${p.quantity > 1 ? ' x' + p.quantity : ''}</span></label><button class="btn btn-sm" style="padding:2px 6px;font-size:11px" onclick="deletePackingItem('${esc(p.id)}')">✕</button></div>`;
                    });
                });
            } else {
                packingHTML += '<p style="font-size:13px;color:var(--text-muted);margin:4px 0">No items yet</p>';
            }
            packingHTML += `<div style="margin-top:8px;display:flex;gap:4px"><input type="text" id="packingItemInput" class="input" placeholder="Item name" style="flex:1;font-size:13px"><input type="text" id="packingCategoryInput" class="input" placeholder="Category" style="width:100px;font-size:13px"><button class="btn btn-sm" onclick="addPackingItem()">Add</button></div>`;
            packingHTML += '</div></div>';
        }
        mc.innerHTML = `<div class="view-content"><div class="view-header"><h2>Action Items</h2><span style="font-size:13px;color:var(--text-muted)">${completedCount}/${phases.length} phases complete</span></div><div style="margin-bottom:16px"><div class="progress-bar" style="height:10px"><div class="progress-fill ${overallPct === 100 ? 'success' : ''}" style="width:${overallPct}%"></div></div></div>${phasesHTML}${packingHTML}</div>`;
    }

    function addPackingItem() {
        const trip = getTrip(); if (!trip) return;
        const input = document.getElementById('packingItemInput');
        const catInput = document.getElementById('packingCategoryInput');
        const item = (input.value || '').trim();
        if (!item) return;
        if (!trip.packingList) trip.packingList = [];
        trip.packingList.push({ id: uid(), item: item, category: (catInput.value || '').trim() || 'Other', packed: false, quantity: 1 });
        saveData(); render();
    }

    function togglePackingItem(itemId) {
        const trip = getTrip(); if (!trip) return;
        const p = (trip.packingList || []).find(i => i.id === itemId);
        if (p) { p.packed = !p.packed; saveData(); }
    }

    function deletePackingItem(itemId) {
        const trip = getTrip(); if (!trip) return;
        trip.packingList = (trip.packingList || []).filter(i => i.id !== itemId);
        saveData(); render();
    }

    // === PHASE B: Lodging + Transport + Reservations ===

    function openLodgingModal(lodgingId) {
        const trip = getTrip(); if (!trip) return;
        state.editingId = lodgingId || null; state.editingType = 'lodging';
        const l = lodgingId ? (trip.lodging || []).find(x => x.id === lodgingId) : null;
        openModal(`

            <div class="modal-body">
                <div class="form-group"><label>Hotel / Property Name</label><input class="input" id="lodgingName" value="${esc(l?.name || '')}" placeholder="e.g. Hotel Ritz Madrid"></div>
                <div class="form-group"><label>Leg (City)</label><select class="select" id="lodgingLeg">${legOptions(trip, l?.legId || '')}</select></div>
                <div class="form-group"><label>Address</label><input class="input" id="lodgingAddress" value="${esc(l?.address || '')}" placeholder="Street address"></div>
                <div class="form-row">
                    <div class="form-group"><label>Check-in</label><input class="input" id="lodgingCheckIn" type="date" value="${l?.checkIn || ''}"></div>
                    <div class="form-group"><label>Check-out</label><input class="input" id="lodgingCheckOut" type="date" value="${l?.checkOut || ''}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Cost</label><input class="input" id="lodgingCost" type="number" step="0.01" min="0" value="${l?.cost != null ? l.cost : ''}" placeholder="0.00"></div>
                    <div class="form-group"><label>Currency</label><select class="select" id="lodgingCurrency">${currencyOptions(l?.currency || trip.currency)}</select></div>
                </div>
                <div class="toggle-wrap"><label>Booked</label><button class="toggle ${l?.booked ? 'on' : ''}" id="lodgingBooked" onclick="this.classList.toggle('on')"></button></div>
                ${sensitiveFieldHTML('Confirmation Number', l?.confirmationNumber, 'lodgingConfirmation', 'e.g. ABC123XYZ')}
                ${sensitiveFieldHTML('Booking Platform', l?.bookingPlatform, 'lodgingPlatform', 'e.g. Booking.com, Expedia')}
                ${sensitiveFieldHTML('Phone', l?.phone, 'lodgingPhone', 'Hotel phone number')}
                <div class="form-group"><label>Notes</label><textarea class="textarea" id="lodgingNotes" placeholder="Additional notes...">${esc(l?.notes || '')}</textarea></div>

                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveLodging()">Save</button>
            </div>
        `);
    }

    function saveLodging() {
        const trip = getTrip(); if (!trip) return;
        const name = document.getElementById('lodgingName').value.trim();
        if (!name) { toast('Name is required'); return; }
        const lodgingData = { name, legId: document.getElementById('lodgingLeg').value, address: document.getElementById('lodgingAddress').value.trim(), checkIn: document.getElementById('lodgingCheckIn').value, checkOut: document.getElementById('lodgingCheckOut').value, cost: document.getElementById('lodgingCost').value ? parseFloat(document.getElementById('lodgingCost').value) : null, currency: document.getElementById('lodgingCurrency').value, booked: document.getElementById('lodgingBooked').classList.contains('on'), notes: document.getElementById('lodgingNotes').value.trim() };
        if (isSensitiveAllowed()) {
            const confEl = document.getElementById('lodgingConfirmation'); const platEl = document.getElementById('lodgingPlatform'); const phoneEl = document.getElementById('lodgingPhone');
            if (confEl) lodgingData.confirmationNumber = confEl.value.trim();
            if (platEl) lodgingData.bookingPlatform = platEl.value.trim();
            if (phoneEl) lodgingData.phone = phoneEl.value.trim();
        }
        if (!trip.lodging) trip.lodging = [];
        if (state.editingId) { const existing = trip.lodging.find(x => x.id === state.editingId); if (existing) Object.assign(existing, lodgingData); }
        else { trip.lodging.push({ id: uid(), coordinates: null, confirmationNumber: '', bookingPlatform: '', phone: '', ...lodgingData }); }
        save(); closeModal(); render(); toast(state.editingId ? 'Lodging updated' : 'Lodging added');
    }

    function deleteLodging(id) {
        showConfirm('Delete Lodging', 'Are you sure you want to delete this lodging?').then(ok => {
            if (!ok) return; const trip = getTrip(); if (!trip) return;
            trip.lodging = (trip.lodging || []).filter(x => x.id !== id);
            save(); closeModal(); render(); toast('Lodging deleted');
        });
    }

    function toggleLodgingBooked(id) {
        const trip = getTrip(); if (!trip) return;
        const l = (trip.lodging || []).find(x => x.id === id); if (!l) return;
        l.booked = !l.booked; save(); render(); toast(l.booked ? 'Marked as booked' : 'Marked as unbooked');
    }

    function openQuickBookModal(hotelOptionId, prefillCheckIn) {

        if (!ho) { toast('Hotel option not found'); return; }

            <div class="modal-header"><h3>Book: ${esc(ho.name)}</h3><button class="btn-icon" onclick="closeModal()">\u2715</button></div>
            <div class="modal-body">
                <div style="font-size:13px;color:var(--text-muted);margin-bottom:12px">${esc(ho.city)}${ho.cost != null ? ' &middot; ' + formatCurrency(ho.cost, ho.currency) + '/night' : ''}</div>

                <button class="btn" onclick="closeModal()">Cancel</button>
                <button class="btn btn-primary" onclick="saveQuickBook()">Book</button>
            </div>
        `);
    }

    function saveQuickBook() {
        const trip = getTrip(); if (!trip) return;
        const hoId = document.getElementById('qbHotelOptionId').value;
        const ho = (trip.hotelOptions || []).find(x => x.id === hoId);
        if (!ho) { toast('Hotel option not found'); return; }

        const checkOut = document.getElementById('qbCheckOut').value;
        if (!checkIn || !checkOut) { toast('Check-in and check-out dates are required'); return; }
        if (checkOut <= checkIn) { toast('Check-out must be after check-in'); return; }
        const legId = (trip.legs || []).find(l => l.city === ho.city)?.id || '';
        if (!trip.lodging) trip.lodging = [];
        trip.lodging.push({ id: uid(), name: ho.name, legId, address: '', checkIn, checkOut, cost: ho.cost, currency: ho.currency, booked: true, confirmationNumber: '', bookingPlatform: '', phone: '', coordinates: null, notes: ho.notes || '' });
        save(); closeModal(); render(); toast('Lodging booked from hotel option');
    }

    function openTransportModal(transportId) {
        const trip = getTrip(); if (!trip) return;
        state.editingId = transportId || null; state.editingType = 'transport';
        const t = transportId ? (trip.transport || []).find(x => x.id === transportId) : null;
        openModal(`
            <div class="modal-header"><h3>${t ? 'Edit Transport' : 'New Transport'}</h3><button class="btn-icon" onclick="closeModal()">\u2715</button></div>
            <div class="modal-body">
                <div class="form-group"><label>Type</label><select class="select" id="transportType">${transportTypeOptions(t?.type || 'flight')}</select></div>
                <div class="form-row">
                    <div class="form-group"><label>From Leg</label><select class="select" id="transportFromLeg">${legOptions(trip, t?.fromLegId || '')}</select></div>
                    <div class="form-group"><label>To Leg</label><select class="select" id="transportToLeg">${legOptions(trip, t?.toLegId || '')}</select></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Carrier</label><input class="input" id="transportCarrier" value="${esc(t?.carrier || '')}" placeholder="e.g. United Airlines"></div>
                    <div class="form-group"><label>Flight / Train Number</label><input class="input" id="transportFlightNumber" value="${esc(t?.flightNumber || '')}" placeholder="e.g. UA 123"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Departure</label><input class="input" id="transportDeparture" type="datetime-local" value="${t?.departure || ''}"></div>
                    <div class="form-group"><label>Arrival</label><input class="input" id="transportArrival" type="datetime-local" value="${t?.arrival || ''}"></div>
                </div>
                ${sensitiveFieldHTML('Seat Info', t?.seatInfo, 'transportSeat', 'e.g. 14A Window')}
                <div class="form-row">
                    <div class="form-group"><label>Cost</label><input class="input" id="transportCost" type="number" step="0.01" min="0" value="${t?.cost != null ? t.cost : ''}" placeholder="0.00"></div>
                    <div class="form-group"><label>Currency</label><select class="select" id="transportCurrency">${currencyOptions(t?.currency || trip.currency)}</select></div>
                </div>
                <div class="toggle-wrap"><label>Booked</label><button class="toggle ${t?.booked ? 'on' : ''}" id="transportBooked" onclick="this.classList.toggle('on')"></button></div>
                ${sensitiveFieldHTML('Confirmation Number', t?.confirmationNumber, 'transportConfirmation', 'e.g. ABCDEF')}
                ${sensitiveFieldHTML('Booking Platform', t?.bookingPlatform, 'transportPlatform', 'e.g. Google Flights, Trainline')}
                <div class="form-group"><label>Notes</label><textarea class="textarea" id="transportNotes" placeholder="Additional notes...">${esc(t?.notes || '')}</textarea></div>

    function saveTransport() {
        const trip = getTrip(); if (!trip) return;
        const fromLegId = document.getElementById('transportFromLeg').value;
        const toLegId = document.getElementById('transportToLeg').value;
        const fromLeg = (trip.legs || []).find(l => l.id === fromLegId);
        const toLeg = (trip.legs || []).find(l => l.id === toLegId);
        const transportData = { type: document.getElementById('transportType').value, fromLegId, toLegId, fromCity: fromLeg ? fromLeg.city : '', toCity: toLeg ? toLeg.city : '', carrier: document.getElementById('transportCarrier').value.trim(), flightNumber: document.getElementById('transportFlightNumber').value.trim(), departure: document.getElementById('transportDeparture').value, arrival: document.getElementById('transportArrival').value, cost: document.getElementById('transportCost').value ? parseFloat(document.getElementById('transportCost').value) : null, currency: document.getElementById('transportCurrency').value, booked: document.getElementById('transportBooked').classList.contains('on'), notes: document.getElementById('transportNotes').value.trim() };
        if (isSensitiveAllowed()) {
            const seatEl = document.getElementById('transportSeat'); const confEl = document.getElementById('transportConfirmation'); const platEl = document.getElementById('transportPlatform');
            if (seatEl) transportData.seatInfo = seatEl.value.trim();
            if (confEl) transportData.confirmationNumber = confEl.value.trim();
            if (platEl) transportData.bookingPlatform = platEl.value.trim();

        if (!trip.transport) trip.transport = [];
        if (state.editingId) { const existing = trip.transport.find(x => x.id === state.editingId); if (existing) Object.assign(existing, transportData); }
        else { trip.transport.push({ id: uid(), confirmationNumber: '', bookingPlatform: '', seatInfo: '', ...transportData }); }
        save(); closeModal(); render(); toast(state.editingId ? 'Transport updated' : 'Transport added');
    }

    function deleteTransport(id) {
        showConfirm('Delete Transport', 'Are you sure you want to delete this transport?').then(ok => {
            if (!ok) return; const trip = getTrip(); if (!trip) return;
            trip.transport = (trip.transport || []).filter(x => x.id !== id);
            save(); closeModal(); render(); toast('Transport deleted');

    function toggleTransportBooked(id) {
        const trip = getTrip(); if (!trip) return;
        const t = (trip.transport || []).find(x => x.id === id); if (!t) return;
        t.booked = !t.booked; save(); render(); toast(t.booked ? 'Marked as booked' : 'Marked as unbooked');
    }

    function copyConfirmation(text) {
        navigator.clipboard.writeText(text).then(() => toast('Copied!')).catch(() => toast('Copy failed'));
    }

    function renderReservations() {
        const trip = getTrip(); const mc = document.getElementById('mainContent');
        if (!trip) { mc.innerHTML = '<div class="view-content"><div class="empty-state"><p>No trip selected.</p></div></div>'; return; }
        const _travelActive = isTravelMode();
        const _today = localDateStr(new Date());
        let transport = trip.transport || []; let lodging = trip.lodging || []; let activities = trip.activities || [];
        if (_travelActive) {
            transport = transport.filter(t => !t.departure || t.departure.split('T')[0] >= _today);
            lodging = lodging.filter(l => !l.checkOut || l.checkOut >= _today);
            activities = activities.filter(a => !a.date || a.date >= _today);
        }
        const flights = transport.filter(t => t.type === 'flight').sort((a, b) => (a.departure || '').localeCompare(b.departure || ''));
        const trains = transport.filter(t => t.type === 'train').sort((a, b) => (a.departure || '').localeCompare(b.departure || ''));
        const otherTransport = transport.filter(t => !['flight', 'train'].includes(t.type)).sort((a, b) => (a.departure || '').localeCompare(b.departure || ''));
        const hotels = [...lodging].sort((a, b) => (a.checkIn || '').localeCompare(b.checkIn || ''));
        const reservedActivities = activities.filter(a => a.reservationNeeded);

        function fmtDT(dtStr) { if (!dtStr) return ''; if (dtStr.includes('T')) { const p = dtStr.split('T'); return formatDate(p[0]) + ' ' + formatTime(p[1]); } return formatDate(dtStr); }

        function renderTransportCard(t) {
            const icon = TRANSPORT_TYPES[t.type] || '\u{1F690}';
            const route = [t.fromCity, t.toCity].filter(Boolean).join(' \u2192 ');
            const label = [t.carrier, t.flightNumber].filter(Boolean).join(' ') || route || 'Transport';
            const depArr = [t.departure ? fmtDT(t.departure) : '', t.arrival ? fmtDT(t.arrival) : ''].filter(Boolean).join(' \u2192 ');
            let confHTML = '';
            if (t.confirmationNumber && isSensitiveAllowed()) confHTML = `<div style="margin-top:6px"><span class="confirmation-code" onclick="copyConfirmation('${esc(t.confirmationNumber)}')" title="Click to copy">${esc(t.confirmationNumber)}</span></div>`;
            const costHTML = t.cost != null && t.cost !== '' ? `<div style="margin-top:4px"><span style="font-size:13px;color:var(--text-muted)">${formatCurrency(t.cost, t.currency)}</span></div>` : '';
            return `<div class="card${t.booked ? '' : ' unbooked'}" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span>${icon}</span><strong>${esc(label)}</strong>${route && label !== route ? `<span style="font-size:13px;color:var(--text-muted)">${esc(route)}</span>` : ''}${t.booked ? '<span class="badge badge-ready">Booked</span>' : '<span class="badge badge-booking">Unbooked</span>'}</div>${depArr ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${depArr}</div>` : ''}${confHTML}${costHTML}</div><div class="item-actions"><button class="btn-icon" onclick="toggleTransportBooked('${t.id}')" title="${t.booked ? 'Mark unbooked' : 'Mark booked'}">${t.booked ? '\u2705' : '\u2B1C'}</button><button class="btn-icon" onclick="openTransportModal('${t.id}')" title="Edit">\u270F\uFE0F</button></div></div></div>`;
        }

        function renderLodgingCard(l) {
            const dates = [l.checkIn ? formatDate(l.checkIn) : '', l.checkOut ? formatDate(l.checkOut) : ''].filter(Boolean).join(' \u2192 ');
            const nights = (l.checkIn && l.checkOut) ? daysBetween(l.checkIn, l.checkOut) : 0;
            const nightsLabel = nights > 0 ? `${nights} night${nights !== 1 ? 's' : ''}` : '';
            let confHTML = '';
            if (l.confirmationNumber && isSensitiveAllowed()) confHTML = `<div style="margin-top:6px"><span class="confirmation-code" onclick="copyConfirmation('${esc(l.confirmationNumber)}')" title="Click to copy">${esc(l.confirmationNumber)}</span></div>`;
            const costHTML = l.cost != null && l.cost !== '' ? `<div style="margin-top:4px"><span style="font-size:13px;color:var(--text-muted)">${formatCurrency(l.cost, l.currency)}</span></div>` : '';
            return `<div class="card${l.booked ? '' : ' unbooked'}" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span>\u{1F3E8}</span><strong>${esc(l.name || 'Hotel')}</strong>${l.booked ? '<span class="badge badge-ready">Booked</span>' : '<span class="badge badge-booking">Unbooked</span>'}</div>${dates ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${dates}${nightsLabel ? ' (' + nightsLabel + ')' : ''}</div>` : ''}${l.address ? `<div style="font-size:13px;color:var(--text-muted);margin-top:2px">${esc(l.address)}</div>` : ''}${confHTML}${costHTML}</div><div class="item-actions"><button class="btn-icon" onclick="toggleLodgingBooked('${l.id}')" title="${l.booked ? 'Mark unbooked' : 'Mark booked'}">${l.booked ? '\u2705' : '\u2B1C'}</button><button class="btn-icon" onclick="openLodgingModal('${l.id}')" title="Edit">\u270F\uFE0F</button></div></div></div>`;
        }

        function renderActivityResCard(a) {
            const icon = CATEGORIES[a.category] || '\u{1F4CC}';
            const dateTime = [a.date ? formatDate(a.date) : '', a.time ? formatTime(a.time) : ''].filter(Boolean).join(' ');
            const costHTML = a.cost != null && a.cost !== '' ? `<div style="margin-top:4px"><span style="font-size:13px;color:var(--text-muted)">${formatCurrency(a.cost, a.currency)}</span></div>` : '';
            return `<div class="card${a.booked ? '' : ' unbooked'}" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span>${icon}</span><strong>${esc(a.name || 'Activity')}</strong>${a.booked ? '<span class="badge badge-ready">Booked</span>' : '<span class="badge badge-booking">Unbooked</span>'}</div>${dateTime ? `<div style="font-size:13px;color:var(--text-muted);margin-top:4px">${dateTime}</div>` : ''}${costHTML}</div><div class="item-actions"><button class="btn-icon" onclick="openActivityModal('${a.id}')" title="Edit">\u270F\uFE0F</button></div></div></div>`;
        }

        function renderSection(title, icon, items, renderFn, emptyMsg) {
            const content = items.length > 0 ? items.map(renderFn).join('') : `<div style="padding:16px;color:var(--text-muted);font-size:13px;text-align:center">${esc(emptyMsg)}</div>`;
            return `<div style="margin-bottom:20px"><h3 style="font-size:0.95rem;margin-bottom:8px;display:flex;align-items:center;gap:6px"><span>${icon}</span> ${esc(title)} <span style="font-size:12px;color:var(--text-muted);font-weight:normal">(${items.length})</span></h3>${content}</div>`;
        }

        function renderHotelOptionCard(ho) {
            const costHTML = ho.cost != null && ho.cost !== '' ? `<div style="margin-top:4px"><span style="font-size:13px;color:var(--text-muted)">${formatCurrency(ho.cost, ho.currency)}/night</span></div>` : '';
            const linkHTML = ho.link ? `<div style="margin-top:4px"><a href="${esc(ho.link)}" target="_blank" rel="noopener" style="font-size:12px;color:var(--purple)" onclick="event.stopPropagation()">Booking link</a></div>` : '';
            const notesHTML = ho.notes ? `<div style="margin-top:4px;font-size:12px;color:var(--text-muted)">${esc(ho.notes)}</div>` : '';
            return `<div class="card" style="margin-bottom:8px"><div class="card-body" style="display:flex;justify-content:space-between;align-items:flex-start;gap:8px"><div style="flex:1;min-width:0"><div style="display:flex;align-items:center;gap:6px;flex-wrap:wrap"><span>\u{1F3E8}</span><strong>${esc(ho.name)}</strong><span class="badge" style="font-size:10px;background:var(--bg-secondary)">${esc(ho.city)}</span></div>${costHTML}${linkHTML}${notesHTML}</div><div class="item-actions"><button class="btn btn-sm" onclick="openQuickBookModal('${esc(ho.id)}')" title="Book this hotel" style="font-size:11px">Book</button><button class="btn-icon" onclick="openHotelOptionModal('${esc(ho.id)}')" title="Edit">\u270F\uFE0F</button></div></div></div>`;
        }

        const hotelOptions = _travelActive ? [] : (trip.hotelOptions || []).slice().sort((a, b) => (a.city || '').localeCompare(b.city || '') || (a.name || '').localeCompare(b.name || ''));
        const _hotelOptsSection = _travelActive ? '' : renderSection('Hotel Options','\u{1F50D}',hotelOptions,renderHotelOptionCard,'No hotel options yet');
        const _resFab = _travelActive ? '' : `<button class="fab" onclick="openReservationQuickAdd()" title="Add reservation">+</button>`;

        mc.innerHTML = `<div class="view-content"><div class="view-header"><h2>Reservations</h2></div>${renderSection('Flights','\u2708\uFE0F',flights,renderTransportCard,'No flights booked yet')}${renderSection('Trains','\u{1F686}',trains,renderTransportCard,'No trains booked yet')}${renderSection('Other Transport','\u{1F690}',otherTransport,renderTransportCard,'No other transport booked yet')}${renderSection('Hotels','\u{1F3E8}',hotels,renderLodgingCard,'No hotels booked yet')}${_hotelOptsSection}${renderSection('Activity Reservations','\u{1F3AF}',reservedActivities,renderActivityResCard,'No activity reservations yet')}</div>${_resFab}`;
    }

    function openReservationQuickAdd() {
        openModal(`<div class="modal-header"><h3>Add Reservation</h3><button class="btn-icon" onclick="closeModal()">\u2715</button></div>
        <div class="modal-body"><p style="font-size:13px;color:var(--text-muted);margin-bottom:16px">What kind of reservation?</p>
        <div style="display:flex;flex-direction:column;gap:8px">
            <button class="btn" onclick="closeModal();openLodgingModal()" style="justify-content:flex-start;height:48px"><span>\u{1F3E8}</span> Lodging</button>
            <button class="btn" onclick="closeModal();openTransportModal()" style="justify-content:flex-start;height:48px"><span>\u2708\uFE0F</span> Transport</button>
            <button class="btn" onclick="closeModal();openHotelOptionModal()" style="justify-content:flex-start;height:48px"><span>\u{1F50D}</span> Hotel Option</button>
        </div></div>`);

    // === PHASE C: Activities + Day Plans + Option Groups ===

    let placeSearchTimer = null;
    let lastPlaceResult = null;

    function openActivityModalForDate(dateStr, legId) {
        openActivityModal(null, dateStr, legId);
    }

    function openLodgingModalForDate(dateStr, legId, endDateStr) {
        openLodgingModal();
        setTimeout(() => {
            const ciEl = document.getElementById('lodgingCheckIn');
            const coEl = document.getElementById('lodgingCheckOut');
            const legEl = document.getElementById('lodgingLeg');
            if (ciEl && dateStr) ciEl.value = dateStr;
            if (coEl && endDateStr) coEl.value = endDateStr;
            if (legEl && legId) legEl.value = legId;
        }, 50);
    }

    function openTransportModalForDate(dateStr) {
        openTransportModal();
        setTimeout(() => {
            const depEl = document.getElementById('transportDeparture');
            if (depEl && dateStr) depEl.value = dateStr + 'T12:00';
        }, 50);
    }

    function openHotelOptionModalForCity(legId) {
        const trip = getTrip(); if (!trip) return;
        openHotelOptionModal();
        if (legId) {
            const leg = (trip.legs || []).find(l => l.id === legId);
            if (leg) setTimeout(() => { const el = document.getElementById('hoCity'); if (el) el.value = leg.city; }, 50);
        }
    }

    function openActivityModal(activityId, prefillDate, prefillLegId, fromDayPlanId) {
        const trip = getTrip(); if (!trip) return;
        state.editingId = activityId || null; state.editingType = 'activity';
        const act = activityId ? trip.activities.find(a => a.id === activityId) : null;
        lastPlaceResult = act?.coordinates ? { lat: act.coordinates.lat, lng: act.coordinates.lng } : null;
        const ogOptions = `<option value="">None</option>` + (trip.optionGroups || []).map(og => `<option value="${og.id}"${og.id === act?.optionGroupId ? ' selected' : ''}>${esc(og.name)}</option>`).join('');
        const visitedSection = act?.visited ? `<hr style="border:none;border-top:1px solid var(--border);margin:16px 0"><div class="form-group"><label>Visited At</label><input class="input" id="actVisitedAt" type="datetime-local" value="${act.visitedAt ? act.visitedAt.slice(0, 16) : ''}"></div><div class="form-group"><label>Rating</label><div class="rating" id="actRatingWidget">${[1,2,3,4,5].map(s => `<span class="star${(act.rating || 0) >= s ? ' filled' : ''}" onclick="document.querySelectorAll('#actRatingWidget .star').forEach((st,i)=>{if(i<${s})st.classList.add('filled');else st.classList.remove('filled')});document.getElementById('actRatingVal').value='${s}'">&#9733;</span>`).join('')}</div><input type="hidden" id="actRatingVal" value="${act.rating || ''}"></div>` : '';

        let dayPlanLinks = '';
        if (act && !fromDayPlanId) {
            const containingPlans = (trip.dayPlans || []).filter(dp => (dp.activityIds || []).includes(act.id));
            if (containingPlans.length > 0) {
                dayPlanLinks = `<div style="margin-top:8px;padding:8px 12px;background:var(--bg-secondary);border-radius:8px;font-size:13px"><span style="color:var(--text-muted)">In day plan${containingPlans.length > 1 ? 's' : ''}:</span> ${containingPlans.map(dp => `<a href="javascript:void(0)" onclick="openDayPlanFromActivity('${dp.id}')" style="margin-left:4px">${esc(dp.name || dp.id)}</a>`).join(', ')}</div>`;
            }
        }

        const headerHtml = fromDayPlanId
            ? `<div class="modal-header"><button class="btn btn-sm" onclick="saveActivity({returnToDayPlan:true})" style="margin-right:8px">\u2190 Back</button><h3>Edit Activity</h3><button class="btn-icon" onclick="closeModal()">\u2715</button></div>`
            : `<div class="modal-header"><h3>${act ? 'Edit Activity' : 'New Activity'}</h3><button class="btn-icon" onclick="closeModal()">\u2715</button></div>`;

        openModal(`
            ${headerHtml}
            <div class="modal-body">
                <div class="form-group"><label>Name</label><input class="input" id="actName" value="${esc(act?.name || '')}" placeholder="e.g. Visit the Louvre"></div>
                <div class="form-row">
                    <div class="form-group"><label>Leg</label><select class="select" id="actLeg">${legOptions(trip, act?.legId || prefillLegId)}</select></div>
                    <div class="form-group"><label>Category</label><select class="select" id="actCategory">${categoryOptions(act?.category)}</select></div>
                </div>
                <div class="form-group"><label>Address</label><div class="search-wrap"><input class="input" id="actAddress" value="${esc(act?.address || '')}" placeholder="Search for a place..." oninput="searchPlace(this.value)"><div class="search-results" id="placeResults" style="display:none"></div></div></div>
                <div class="form-row">
                    <div class="form-group"><label>Date</label><input class="input" id="actDate" type="date" value="${act?.date || prefillDate || ''}"></div>
                    <div class="form-group"><label>Time</label><input class="input" id="actTime" type="time" value="${act?.time || ''}"></div>
                    <div class="form-group"><label>Duration (min)</label><input class="input" id="actDuration" type="number" min="0" value="${act?.duration || ''}"></div>
                </div>
                <div class="form-row">
                    <div class="form-group"><label>Cost</label><input class="input" id="actCost" type="number" min="0" step="0.01" value="${act?.cost ?? ''}"></div>
                    <div class="form-group"><label>Currency</label><select class="select" id="actCurrency">${currencyOptions(act?.currency || trip.currency)}</select></div>
                </div>
                <div class="form-group"><label>URL</label><input class="input" id="actUrl" value="${esc(act?.url || '')}" placeholder="https://..."></div>
                <div class="toggle-wrap"><label>Reservation needed</label><button class="toggle${act?.reservationNeeded ? ' on' : ''}" id="actReservationToggle" onclick="this.classList.toggle('on');document.getElementById('actBookedWrap').style.display=this.classList.contains('on')?'flex':'none'"></button></div>
                <div class="toggle-wrap" id="actBookedWrap" style="display:${act?.reservationNeeded ? 'flex' : 'none'}"><label>Booked</label><button class="toggle${act?.booked ? ' on' : ''}" id="actBookedToggle" onclick="this.classList.toggle('on')"></button></div>
                <div class="toggle-wrap"><label>Available any day in this leg</label><button class="toggle${act?.isPooled ? ' on' : ''}" id="actPooledToggle" onclick="this.classList.toggle('on')"></button></div>
                <div class="toggle-wrap"><label>Must happen on specific date/time</label><button class="toggle${act?.isFixed ? ' on' : ''}" id="actFixedToggle" onclick="this.classList.toggle('on')"></button></div>
                <div class="form-group"><label>Option Group</label><select class="select" id="actOptionGroup">${ogOptions}</select></div>
                <div class="form-group"><label>Notes</label><textarea class="textarea" id="actNotes" placeholder="Activity notes...">${esc(act?.notes || '')}</textarea></div>
                <div class="form-group"><label>Photos <span style="font-weight:normal;color:var(--text-muted);font-size:12px">(max 5)</span></label><div id="actPhotos" style="display:flex;flex-wrap:wrap;gap:4px"></div><div style="display:flex;gap:8px;margin-top:4px"><button type="button" class="btn btn-sm" onclick="addPhotoFromFile()">Upload</button><button type="button" class="btn btn-sm" onclick="addPhotoFromUrl()">From URL</button></div></div>
                ${visitedSection}
                ${dayPlanLinks}
            </div>
            <div class="modal-footer">
                ${act ? `<button class="btn btn-danger" onclick="deleteActivity('${act.id}')" style="margin-right:auto">Delete</button>` : ''}
                <button class="btn" onclick="${fromDayPlanId ? 'returnToDayPlanModal()' : 'closeModal()'}">Cancel</button>
                <button class="btn btn-primary" onclick="saveActivity(${fromDayPlanId ? '{returnToDayPlan:true}' : ''})">${fromDayPlanId ? 'Save & Back' : 'Save'}</button>
            </div>
        `);
        initPhotoEditor(act?.photos || []);
    }

    function initPhotoEditor(existingPhotos) {
        _pendingPhotos = (existingPhotos || []).slice();
        renderPhotoThumbnails();
    }

    function renderPhotoThumbnails() {
        const el = document.getElementById('actPhotos'); if (!el) return;
        if (_pendingPhotos.length === 0) { el.innerHTML = '<span style="font-size:12px;color:var(--text-muted)">No photos</span>'; return; }
        el.innerHTML = _pendingPhotos.map((p, i) => `<div style="position:relative;width:48px;height:48px;flex-shrink:0"><img src="${esc(p.url)}" style="width:48px;height:48px;object-fit:cover;border-radius:4px;border:1px solid var(--border)"><button type="button" onclick="removePhoto(${i})" style="position:absolute;top:-4px;right:-4px;width:16px;height:16px;border-radius:50%;background:var(--danger);color:#fff;border:none;font-size:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;line-height:1">&times;</button></div>`).join('');
    }

    function addPhotoFromFile() {
        if (_pendingPhotos.length >= 5) { toast('Max 5 photos per activity'); return; }
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = 'image/*';
        inp.onchange = async (e) => {
            const file = e.target.files[0]; if (!file) return;
            const reader = new FileReader();
            reader.onload = async () => {
                try {
                    const resized = await resizeImage(reader.result, 800, 0.7);
                    _pendingPhotos.push({ url: resized });
                    renderPhotoThumbnails();
                } catch (err) { toast('Failed to process image'); }
            };
            reader.readAsDataURL(file);
        };
        inp.click();
    }

    function addPhotoFromUrl() {
        if (_pendingPhotos.length >= 5) { toast('Max 5 photos per activity'); return; }
        const url = prompt('Enter image URL:');
        if (url && url.trim()) { _pendingPhotos.push({ url: url.trim() }); renderPhotoThumbnails(); }
    }

    function removePhoto(index) {
        _pendingPhotos.splice(index, 1);
        renderPhotoThumbnails();
    }

    function resizeImage(dataUrl, maxWidth, quality) {
        return new Promise((resolve, reject) => {
            const img = new Image();
            img.onload = () => {
                let w = img.width, h = img.height;
                if (w > maxWidth) { h = Math.round(h * maxWidth / w); w = maxWidth; }
                const canvas = document.createElement('canvas');
                canvas.width = w; canvas.height = h;
                const ctx = canvas.getContext('2d');
                ctx.drawImage(img, 0, 0, w, h);
                resolve(canvas.toDataURL('image/jpeg', quality));
            };
            img.onerror = reject;
            img.src = dataUrl;
        });
    }

    function saveActivity(opts) {
        const trip = getTrip(); if (!trip) return;
        const name = document.getElementById('actName').value.trim();
        if (!name) { toast('Activity name is required'); return; }
        const coordinates = lastPlaceResult ? { lat: lastPlaceResult.lat, lng: lastPlaceResult.lng } : null;
        let osmLink = '';
        if (coordinates?.lat && coordinates?.lng) osmLink = `https://www.openstreetmap.org/?mlat=${coordinates.lat}&mlon=${coordinates.lng}#map=17/${coordinates.lat}/${coordinates.lng}`;
        const actData = { name, legId: document.getElementById('actLeg').value || '', category: document.getElementById('actCategory').value, address: document.getElementById('actAddress').value.trim(), coordinates, date: document.getElementById('actDate').value, time: document.getElementById('actTime').value, duration: parseInt(document.getElementById('actDuration').value) || 0, cost: parseFloat(document.getElementById('actCost').value) || 0, currency: document.getElementById('actCurrency').value, url: document.getElementById('actUrl').value.trim(), reservationNeeded: document.getElementById('actReservationToggle').classList.contains('on'), booked: document.getElementById('actBookedToggle').classList.contains('on') && document.getElementById('actReservationToggle').classList.contains('on'), isPooled: document.getElementById('actPooledToggle').classList.contains('on'), isFixed: document.getElementById('actFixedToggle').classList.contains('on'), optionGroupId: document.getElementById('actOptionGroup').value || null, osmLink, notes: document.getElementById('actNotes').value.trim(), photos: _pendingPhotos.slice() };
        if (state.editingId) {
            const act = trip.activities.find(a => a.id === state.editingId);
            if (act) { Object.assign(act, actData); const rEl = document.getElementById('actRatingVal'); if (rEl) act.rating = parseInt(rEl.value) || 0; const vEl = document.getElementById('actVisitedAt'); if (vEl?.value) act.visitedAt = new Date(vEl.value).toISOString(); }
        } else {
            if (!trip.activities) trip.activities = [];
            const maxOrder = trip.activities.length > 0 ? Math.max(...trip.activities.map(a => a.order || 0)) : 0;
            trip.activities.push({ id: uid(), ...actData, visited: false, visitedAt: null, rating: 0, order: maxOrder + 1 });
        }
        save();
        if (opts?.returnToDayPlan && _dayPlanReturnState) {
            toast('Activity saved');
            returnToDayPlanModal();
        } else {
            closeModal(); render(); toast(state.editingId ? 'Activity updated' : 'Activity created');
        }
    }

    async function deleteActivity(id) {
        const ok = await showConfirm('Delete Activity', 'This will permanently delete this activity.');
        if (!ok) return; const trip = getTrip(); if (!trip) return;
        trip.activities = (trip.activities || []).filter(a => a.id !== id);
        for (const dp of (trip.dayPlans || [])) dp.activityIds = (dp.activityIds || []).filter(aid => aid !== id);
        save(); closeModal(); render(); toast('Activity deleted');
    }

    function toggleActivityVisited(id) {
        const trip = getTrip(); if (!trip) return;
        const act = (trip.activities || []).find(a => a.id === id); if (!act) return;
        act.visited = !act.visited;
        if (act.visited) act.visitedAt = new Date().toISOString();
        else { act.visitedAt = null; act.rating = 0; }
        save(); render();
    }

    function rateActivity(id, rating) {
        const trip = getTrip(); if (!trip) return;
        const act = (trip.activities || []).find(a => a.id === id); if (!act) return;
        act.rating = Math.max(1, Math.min(5, parseInt(rating) || 0));
        save(); render();
    }

    let _dayPlanReturnState = null;
    let _activityReturnState = null;
    let _dayPlanOpenedFromActivity = false;

    function snapshotDayPlanForm(dayPlanId) {
        const activityIds = [];
        document.querySelectorAll('#dpActivityList .item-row').forEach(row => {
            const cb = row.querySelector('input[type="checkbox"]');
            if (cb) activityIds.push({ id: cb.value, checked: cb.checked });
        });
        return {
            dayPlanId,
            name: document.getElementById('dpName')?.value || '',
            legId: document.getElementById('dpLeg')?.value || '',
            date: document.getElementById('dpDate')?.value || '',
            notes: document.getElementById('dpNotes')?.value || '',
            activityIds
        };
    }

    function snapshotActivityForm(activityId) {

    function refreshDayPlanActivities() {

    function handleDayPlanDrop(event, targetIdx) {
        const sourceIdx = parseInt(event.dataTransfer.getData('text/plain'));
        if (isNaN(sourceIdx) || sourceIdx === targetIdx) return;
        const list = document.getElementById('dpActivityList'); if (!list) return;
        const rows = Array.from(list.children);
        if (sourceIdx < 0 || sourceIdx >= rows.length || targetIdx < 0 || targetIdx >= rows.length) return;
        const sourceRow = rows[sourceIdx]; const targetRow = rows[targetIdx];
        if (sourceIdx < targetIdx) list.insertBefore(sourceRow, targetRow.nextSibling);
        else list.insertBefore(sourceRow, targetRow);
    }

    function saveDayPlan(opts) {
        const trip = getTrip(); if (!trip) return;
        const name = document.getElementById('dpName').value.trim();
        if (!name) { toast('Day plan name is required'); return; }
        const activityIds = [];
        document.querySelectorAll('#dpActivityList .item-row').forEach(row => { const cb = row.querySelector('input[type="checkbox"]'); if (cb?.checked) activityIds.push(cb.value); });
        const dpData = { name, legId: document.getElementById('dpLeg').value || '', assignedDate: document.getElementById('dpDate').value || null, activityIds, notes: document.getElementById('dpNotes').value.trim() };
        if (state.editingId) { const dp = (trip.dayPlans || []).find(d => d.id === state.editingId); if (dp) Object.assign(dp, dpData); }
        else { if (!trip.dayPlans) trip.dayPlans = []; const maxOrder = trip.dayPlans.length > 0 ? Math.max(...trip.dayPlans.map(d => d.order || 0)) : 0; trip.dayPlans.push({ id: uid(), ...dpData, order: maxOrder + 1 }); }
        save();
        if (opts?.returnToActivity && _activityReturnState) {
            toast('Day plan saved');
            returnToActivityModal();
        } else {
            closeModal(); render(); toast(state.editingId ? 'Day plan updated' : 'Day plan created');
        }
    }

    function assignDayPlan(dpId, date) {
        const trip = getTrip(); if (!trip) return;

        dp.assignedDate = date || null; save(); render();

    function useDayPlanForDate(dpId, dateStr) {
        const trip = getTrip(); if (!trip) return;
        const dp = (trip.dayPlans || []).find(d => d.id === dpId); if (!dp) return;
        const leg = getLegForDate(trip, dateStr);
        for (const actId of (dp.activityIds || [])) {
            const act = (trip.activities || []).find(a => a.id === actId);
            if (act) {
                act.date = dateStr;

            }

        dp.usedDate = dateStr;

    function searchPlace(query) {
        const resultsEl = document.getElementById('placeResults'); if (!resultsEl) return;
        if (!query || query.trim().length < 3) { resultsEl.style.display = 'none'; return; }
        clearTimeout(placeSearchTimer);
        placeSearchTimer = setTimeout(async () => {
            resultsEl.style.display = 'block'; resultsEl.innerHTML = '<div class="search-loading">Searching...</div>';
            try {
                const response = await fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query.trim())}&limit=5`);
                const results = await response.json();
                if (!results || results.length === 0) { resultsEl.innerHTML = '<div class="search-loading">No results found</div>'; return; }
                resultsEl.innerHTML = results.map((r, i) => `<div class="search-result" onclick="selectPlace(${i})"><div>${esc(r.display_name.split(',').slice(0,3).join(','))}</div><div class="result-sub">${esc(r.display_name)}</div></div>`).join('');
                resultsEl._results = results;
            } catch (e) { resultsEl.innerHTML = '<div class="search-loading">Search failed</div>'; }
        }, 500);
    }

    function selectPlace(index) {
        const resultsEl = document.getElementById('placeResults');
        if (!resultsEl || !resultsEl._results) return;
        const result = resultsEl._results[index]; if (!result) return;
        lastPlaceResult = { lat: parseFloat(result.lat), lng: parseFloat(result.lon) };
        const addressEl = document.getElementById('actAddress');
        if (addressEl) addressEl.value = result.display_name;
        resultsEl.style.display = 'none';
    }

    // === PHASE D: Itinerary View + Smart Paste ===

    function getDayRange(trip) {
        if (!trip || !trip.startDate || !trip.endDate) return [];
        const start = new Date(trip.startDate + 'T00:00:00');
        const end = new Date(trip.endDate + 'T00:00:00');
        if (isNaN(start) || isNaN(end) || end < start) return [];
        const days = []; const cur = new Date(start);
        while (cur <= end) { days.push(localDateStr(cur)); cur.setDate(cur.getDate() + 1); }
        return days;
    }

    function getEventsForDate(trip, dateStr) {
        const result = { transport: [], lodging: [], activities: [], dayPlans: [] };
        if (!trip || !dateStr) return result;
        for (const t of trip.transport || []) { if (t.departure && t.departure.split('T')[0] === dateStr) result.transport.push(t); }
        for (const l of trip.lodging || []) { if (l.checkIn && l.checkOut && l.checkIn <= dateStr && dateStr < l.checkOut) result.lodging.push(l); }
        for (const dp of trip.dayPlans || []) { if (dp.assignedDate === dateStr) result.dayPlans.push(dp); }
        const dpActIds = new Set();
        for (const dp of result.dayPlans) { for (const aid of dp.activityIds || []) dpActIds.add(aid); }
        for (const a of trip.activities || []) { if (a.date === dateStr || dpActIds.has(a.id)) { if (!result.activities.find(x => x.id === a.id)) result.activities.push(a); } }
        return result;
    }

    function hasBookedLodgingForNight(trip, dateStr) {
        for (const l of trip.lodging || []) {
            if (l.booked && l.checkIn && l.checkOut && l.checkIn <= dateStr && dateStr < l.checkOut) return true;
        }
        return false;
    }

    function getLegForDate(trip, dateStr) {
        if (!trip || !dateStr) return null;
        for (const leg of trip.legs || []) { if (leg.startDate && leg.endDate && dateStr >= leg.startDate && dateStr <= leg.endDate) return leg; }
        return null;
    }

    function computeLegDayNumbers(trip) {
        const result = new Map();
        const days = getDayRange(trip);
        if (days.length === 0) return result;
        const legDays = new Map();
        days.forEach((dateStr, i) => {
            const leg = getLegForDate(trip, dateStr);
            if (leg) {
                if (!legDays.has(leg.id)) legDays.set(leg.id, []);
                legDays.get(leg.id).push(i + 1);
            }
        });
        legDays.forEach((nums, legId) => {
            const ranges = [];
            let start = nums[0], end = nums[0];
            for (let i = 1; i < nums.length; i++) {
                if (nums[i] === end + 1) { end = nums[i]; }
                else { ranges.push(start === end ? String(start) : `${start}\u2013${end}`); start = end = nums[i]; }
            }
            ranges.push(start === end ? String(start) : `${start}\u2013${end}`);
            const label = ranges.join(', ');
            const prefix = (nums.length === 1) ? 'Day' : 'Days';
            result.set(legId, { short: label, full: `${prefix} ${label}` });
        });
        return result;
    }

    function toggleDayCollapsed(dateStr) { state.collapsedDays[dateStr] = !state.collapsedDays[dateStr]; render(); }
    function dismissActivity(actId) { state.dismissedActivities.add(actId); render(); }
    function undismissActivity(actId) { state.dismissedActivities.delete(actId); render(); }

    function reorderDayActivities(dayPlanId, fromIdx, toIdx) {
        const trip = getTrip(); if (!trip) return;
        const dp = (trip.dayPlans || []).find(d => d.id === dayPlanId);
        if (!dp || !dp.activityIds) return;
        const arr = dp.activityIds;
        if (fromIdx < 0 || fromIdx >= arr.length || toIdx < 0 || toIdx >= arr.length) return;
        const [item] = arr.splice(fromIdx, 1); arr.splice(toIdx, 0, item);
        save(); render();
    }

    function findTransportBetween(trip, fromCity, toCity) {
        return (trip.transport || []).filter(t => {
            const fc = (t.fromCity || '').toLowerCase();
            const tc = (t.toCity || '').toLowerCase();
            return fc === (fromCity || '').toLowerCase() && tc === (toCity || '').toLowerCase();
        });
    }

    function renderTravelBanner(trip, fromCity, toCity, dateHint) {
        const transports = findTransportBetween(trip, fromCity, toCity);
        const hasBooked = transports.some(t => t.booked);
        const escAttr = s => esc(s).replace(/'/g, '&#39;');
        if (transports.length > 0) {
            const t = transports[0];
            const icon = TRANSPORT_TYPES[t.type] || '\u{1F690}';
            const label = [t.carrier, t.flightNumber].filter(Boolean).join(' ');
            const timeStr = t.departure ? formatTime(t.departure.split('T')[1]?.substring(0,5)||'') : '';
            const badge = hasBooked ? '<span class="badge badge-ready" style="font-size:10px">Booked</span>' : '<span class="badge badge-booking" style="font-size:10px">Unbooked</span>';
            return `<div style="margin:4px 0;padding:8px 16px;background:var(--bg-secondary);border-radius:8px;display:flex;align-items:center;gap:8px;font-size:13px;cursor:pointer" onclick="openTransportModal('${t.id}')"><span>${icon}</span><strong>${esc(fromCity)} \u2192 ${esc(toCity)}</strong>${label ? `<span style="color:var(--text-muted)">${esc(label)}</span>` : ''}${timeStr ? `<span style="color:var(--text-muted)">${timeStr}</span>` : ''}${badge}</div>`;
        }
        return `<div style="margin:4px 0;padding:8px 16px;background:var(--bg-secondary);border-radius:8px;border:1px dashed var(--border);display:flex;align-items:center;justify-content:space-between;gap:8px;font-size:13px"><span style="color:var(--text-muted)">\u{1F6A9} ${esc(fromCity)} \u2192 ${esc(toCity)}</span><button class="btn btn-sm" style="font-size:11px" onclick="openTransportModalPrefilled('${escAttr(fromCity)}','${escAttr(toCity)}','${dateHint || ''}')">+ Add Transport</button></div>`;
    }

    function openTransportModalPrefilled(fromCity, toCity, dateHint) {
        const trip = getTrip(); if (!trip) return;
        const fromLeg = (trip.legs || []).find(l => l.city === fromCity);
        const toLeg = (trip.legs || []).find(l => l.city === toCity);
        openTransportModal();
        setTimeout(() => {
            const fromEl = document.getElementById('transportFromLeg');
            const toEl = document.getElementById('transportToLeg');

            if (fromEl && fromLeg) fromEl.value = fromLeg.id;
            if (toEl && toLeg) toEl.value = toLeg.id;
            if (depEl && dateHint) depEl.value = dateHint + 'T12:00';
        }, 50);

    function openTransportModalByLeg(fromLegId, toLegId, dateStr) {

            const toEl = document.getElementById('transportToLeg');

            if (toEl && toLegId) toEl.value = toLegId;

    function _renderDayPlanCard(dp, trip, days, opts) {
        const isExpanded = state.expandedDayPlans.has(dp.id);
        const actNames = (dp.activityIds || []).map(aid => { const a = (trip.activities || []).find(x => x.id === aid); return a ? esc(a.name) : '?'; });
        const toggleExpand = `state.expandedDayPlans.has('${dp.id}')?state.expandedDayPlans.delete('${dp.id}'):state.expandedDayPlans.add('${dp.id}');render()`;
        let expandedBody = '';
        if (isExpanded) {
            expandedBody = (dp.activityIds || []).map(aid => {
                const a = (trip.activities || []).find(x => x.id === aid);
                if (!a) return `<div style="padding:4px 0;font-size:13px;color:var(--text-muted)">? (missing)</div>`;
